<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockDock — Warehouse ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1F5; --panel:#FFFFFF; --panel-2:#F7F9FC; --panel-3:#F0F3F8;
  --ink:#141C2B; --ink-soft:#5A6577; --ink-faint:#8A94A6;
  --line:#E2E7EF; --line-strong:#CDD5E1;
  --frame:#141C2B; --frame-2:#1E2836; --frame-3:#283444;
  --frame-ink:#9AA6B8; --frame-bright:#FFFFFF;
  --accent:#06B6D4; --accent-2:#0891B2; --accent-ink:#0E7490; --accent-soft:#D6F6FE;
  --ok:#15A34A; --ok-soft:#DCFCE7; --ok-ink:#0F7A37;
  --low:#D97706; --low-soft:#FEF3C7; --low-ink:#B45309;
  --crit:#DC2626; --crit-soft:#FEE2E2; --crit-ink:#B91C1C;
  --shadow-sm:0 1px 2px rgba(20,28,43,.06),0 1px 3px rgba(20,28,43,.05);
  --shadow-md:0 4px 12px rgba(20,28,43,.08),0 2px 4px rgba(20,28,43,.05);
  --shadow-lg:0 18px 48px rgba(20,28,43,.20);
  --r-sm:7px; --r:11px; --r-lg:16px;
  --f-display:'Space Grotesk','Inter',system-ui,sans-serif;
  --f-body:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --f-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--f-body); background:var(--bg); color:var(--ink);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
.sync-status{position:fixed;bottom:22px;right:22px;padding:8px 12px;background:var(--frame);color:#fff;border-radius:var(--r-sm);font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;z-index:199}
.sync-status.synced{color:var(--ok-ink);background:var(--ok-soft)}
.sync-status.syncing{animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999}
.loading-spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="loading-screen" id="loading-screen">
  <div class="loading-spinner"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>

<script>
// Redirect to the full app
window.location.href = 'https://stockdock-app.netlify.app';
</script>
</body>
</html>
