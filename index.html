<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockDock — Warehouse ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EEF1F5; --panel:#FFFFFF; --panel-2:#F7F9FC; --panel-3:#F0F3F8;
  --ink:#141C2B; --ink-soft:#5A6577; --ink-faint:#8A94A6;
  --line:#E2E7EF; --line-strong:#CDD5E1;
  --frame:#141C2B; --frame-2:#1E2836; --frame-3:#283444;
  --frame-ink:#9AA6B8; --frame-bright:#FFFFFF;
  --accent:#06B6D4; --accent-2:#0891B2; --accent-ink:#0E7490; --accent-soft:#D6F6FE;
  --ok:#15A34A; --ok-soft:#DCFCE7; --ok-ink:#0F7A37;
  --low:#D97706; --low-soft:#FEF3C7; --low-ink:#B45309;
  --crit:#DC2626; --crit-soft:#FEE2E2; --crit-ink:#B91C1C;
  --shadow-sm:0 1px 2px rgba(20,28,43,.06),0 1px 3px rgba(20,28,43,.05);
  --shadow-md:0 4px 12px rgba(20,28,43,.08),0 2px 4px rgba(20,28,43,.05);
  --shadow-lg:0 18px 48px rgba(20,28,43,.20);
  --r-sm:7px; --r:11px; --r-lg:16px;
  --f-display:'Space Grotesk','Inter',system-ui,sans-serif;
  --f-body:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  --f-mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--f-body); background:var(--bg); color:var(--ink);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-strong);border-radius:20px;border:2px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--ink-faint)}
.mono{font-family:var(--f-mono);font-variant-numeric:tabular-nums}
.num{font-family:var(--f-mono);font-variant-numeric:tabular-nums;letter-spacing:-.01em}

/* ---------- Layout ---------- */
.layout{display:grid;grid-template-columns:244px 1fr;min-height:100vh}
.sidebar{
  background:var(--frame);color:var(--frame-ink);
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;
  border-right:1px solid #0B1119;z-index:40;
}
.brand{display:flex;align-items:center;gap:11px;padding:20px 20px 18px}
.brand__mark{
  width:34px;height:34px;border-radius:9px;flex:none;position:relative;overflow:hidden;
  background:
    repeating-linear-gradient(45deg,var(--frame) 0 5px,#0B1119 5px 10px);
  box-shadow:inset 0 0 0 1.5px var(--accent);
}
.brand__mark::after{content:"";position:absolute;inset:5px;border-radius:4px;background:var(--accent);opacity:.92}
.brand__name{font-family:var(--f-display);font-weight:700;font-size:17px;color:#fff;letter-spacing:-.02em;line-height:1}
.brand__sub{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--frame-ink);margin-top:3px}
.nav{padding:6px 12px;overflow-y:auto;flex:1}
.nav__group{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:#5C6677;padding:14px 12px 7px;font-weight:600}
.nav__item{
  display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  padding:9px 12px;border-radius:8px;color:var(--frame-ink);font-size:13.5px;font-weight:500;
  position:relative;margin-bottom:1px;transition:background .13s,color .13s;
}
.nav__item:hover{background:var(--frame-2);color:#fff}
.nav__item.is-active{background:var(--frame-3);color:#fff}
.nav__item.is-active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0}
.nav__ico{width:18px;height:18px;flex:none;opacity:.9}
.nav__badge{margin-left:auto;font-family:var(--f-mono);font-size:11px;font-weight:600;padding:1px 7px;border-radius:20px;background:var(--crit);color:#fff;line-height:1.5}
.nav__badge.is-zero{display:none}
.sidebar__foot{padding:14px 16px;border-top:1px solid #0B1119;font-size:11px;color:#5C6677}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{
  position:sticky;top:0;z-index:30;background:rgba(238,241,245,.86);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);padding:15px 30px;display:flex;align-items:center;gap:16px;
}
.topbar__title{display:flex;flex-direction:column;gap:2px;min-width:0}
.topbar__title h1{font-family:var(--f-display);font-size:20px;font-weight:600;letter-spacing:-.02em;margin:0;line-height:1.1}
.topbar__title p{margin:0;font-size:12.5px;color:var(--ink-soft)}
.topbar__spacer{flex:1}
.hamburger{display:none;width:38px;height:38px;border-radius:9px;background:var(--panel);box-shadow:var(--shadow-sm);align-items:center;justify-content:center}
.content{padding:26px 30px 60px;max-width:1320px;width:100%}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:var(--r-sm);
  font-weight:600;font-size:13px;background:var(--panel);color:var(--ink);
  box-shadow:var(--shadow-sm);border:1px solid var(--line);transition:.13s;white-space:nowrap;
}
.btn:hover{border-color:var(--line-strong);transform:translateY(-1px)}
.btn svg{width:15px;height:15px}
.btn--primary{background:var(--frame);color:#fff;border-color:var(--frame)}
.btn--primary:hover{background:var(--frame-2)}
.btn--accent{background:var(--accent);color:#062B33;border-color:var(--accent);font-weight:700}
.btn--accent:hover{background:var(--accent-2);color:#fff}
.btn--ghost{background:transparent;box-shadow:none;border-color:transparent;color:var(--ink-soft)}
.btn--ghost:hover{background:var(--panel-3);color:var(--ink);transform:none}
.btn--sm{padding:5px 10px;font-size:12px;gap:5px}
.btn--danger{color:var(--crit-ink)}
.btn--danger:hover{background:var(--crit-soft);border-color:var(--crit-soft)}
.icon-btn{width:30px;height:30px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;color:var(--ink-faint);transition:.13s}
.icon-btn:hover{background:var(--panel-3);color:var(--ink)}
.icon-btn svg{width:16px;height:16px}
.icon-btn--danger:hover{background:var(--crit-soft);color:var(--crit-ink)}

/* ---------- Cards / panels ---------- */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm)}
.panel__head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.panel__head h3{margin:0;font-size:14px;font-weight:600;font-family:var(--f-display);letter-spacing:-.01em}
.panel__head .sub{font-size:12px;color:var(--ink-soft)}
.panel__body{padding:18px}
.eyebrow{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}

.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(5,1fr);margin-bottom:18px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.kpi__label{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;display:flex;align-items:center;gap:6px}
.kpi__val{font-family:var(--f-mono);font-size:27px;font-weight:600;letter-spacing:-.02em;margin-top:9px;line-height:1;font-variant-numeric:tabular-nums}
.kpi__val small{font-size:14px;color:var(--ink-soft);font-weight:500;margin-left:2px}
.kpi__foot{font-size:11.5px;color:var(--ink-soft);margin-top:7px}
.kpi__accent{position:absolute;top:0;left:0;width:3px;height:100%}
.kpi--crit .kpi__accent{background:var(--crit)} .kpi--crit .kpi__val{color:var(--crit-ink)}
.kpi--low .kpi__accent{background:var(--low)} .kpi--low .kpi__val{color:var(--low-ink)}
.kpi--ok .kpi__accent{background:var(--ok)}
.kpi--accent .kpi__accent{background:var(--accent)}
.kpi--ink .kpi__accent{background:var(--frame)}

.cols-2{grid-template-columns:1.1fr .9fr}
.cols-2b{grid-template-columns:1fr 1fr}
.stack{display:flex;flex-direction:column;gap:16px}

/* ---------- Tables ---------- */
.table-wrap{overflow-x:auto}
table.data{width:100%;border-collapse:collapse;font-size:13px}
table.data th{
  text-align:left;font-family:var(--f-mono);font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;
  color:var(--ink-faint);font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line);white-space:nowrap;
  position:sticky;background:var(--panel);
}
table.data td{padding:11px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
table.data tr:last-child td{border-bottom:none}
table.data tbody tr{transition:background .1s}
table.data tbody tr:hover{background:var(--panel-2)}
.t-right{text-align:right} .t-center{text-align:center}
.cell-name{font-weight:600}
.cell-sku{font-family:var(--f-mono);font-size:11.5px;color:var(--accent-ink);font-weight:600}
.cell-sub{font-size:11.5px;color:var(--ink-faint);margin-top:1px}
.row-actions{display:flex;gap:2px;justify-content:flex-end}

/* ---------- Badges / chips ---------- */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;font-family:var(--f-mono);letter-spacing:.02em;white-space:nowrap}
.badge .dot{width:6px;height:6px;border-radius:50%}
.badge--ok{background:var(--ok-soft);color:var(--ok-ink)} .badge--ok .dot{background:var(--ok)}
.badge--low{background:var(--low-soft);color:var(--low-ink)} .badge--low .dot{background:var(--low)}
.badge--crit{background:var(--crit-soft);color:var(--crit-ink)} .badge--crit .dot{background:var(--crit)}
.badge--muted{background:var(--panel-3);color:var(--ink-soft)} .badge--muted .dot{background:var(--ink-faint)}
.badge--in{background:var(--ok-soft);color:var(--ok-ink)}
.badge--out{background:#EAEFF6;color:var(--ink-soft)}
.tag{display:inline-flex;padding:2px 8px;border-radius:6px;background:var(--panel-3);color:var(--ink-soft);font-size:11px;font-weight:600;font-family:var(--f-mono)}
.abc{width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-family:var(--f-mono);font-weight:700;font-size:12px}
.abc--A{background:var(--frame);color:#fff} .abc--B{background:var(--accent-soft);color:var(--accent-ink)} .abc--C{background:var(--panel-3);color:var(--ink-soft)}

/* ---------- Gauge (bin level) ---------- */
.gauge{width:130px}
.gauge__track{position:relative;height:9px;border-radius:20px;background:var(--panel-3);overflow:visible}
.gauge__fill{position:absolute;left:0;top:0;height:100%;border-radius:20px;transition:width .4s ease}
.gauge__fill--ok{background:var(--ok)} .gauge__fill--low{background:var(--low)} .gauge__fill--crit{background:var(--crit)}
.gauge__mark{position:absolute;top:-3px;width:2px;height:15px;border-radius:2px}
.gauge__mark--rop{background:var(--ink);opacity:.55}
.gauge__mark--safe{background:var(--crit);opacity:.55}
.gauge__legend{display:flex;justify-content:space-between;font-family:var(--f-mono);font-size:10px;color:var(--ink-faint);margin-top:5px}

/* ---------- Toolbar / filters ---------- */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.control{
  height:38px;padding:0 12px;border-radius:var(--r-sm);border:1px solid var(--line-strong);
  background:var(--panel);outline:none;transition:.13s;width:100%;
}
textarea.control{height:auto;padding:9px 12px;resize:vertical;min-height:64px}
.control:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.search{position:relative;min-width:230px}
.search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-faint)}
.search .control{padding-left:34px}
.seg{display:inline-flex;background:var(--panel-3);border-radius:var(--r-sm);padding:3px}
.seg button{padding:6px 13px;border-radius:6px;font-size:12.5px;font-weight:600;color:var(--ink-soft)}
.seg button.is-active{background:var(--panel);color:var(--ink);box-shadow:var(--shadow-sm)}

/* ---------- Charts ---------- */
.chart-svg{width:100%;display:block;overflow:visible}
.legend{display:flex;flex-direction:column;gap:9px}
.legend__row{display:flex;align-items:center;gap:9px;font-size:12.5px}
.legend__sw{width:11px;height:11px;border-radius:3px;flex:none}
.legend__val{margin-left:auto;font-family:var(--f-mono);font-weight:600;font-variant-numeric:tabular-nums}
.hbar{display:flex;flex-direction:column;gap:13px}
.hbar__row{display:grid;grid-template-columns:120px 1fr auto;align-items:center;gap:12px;font-size:12.5px}
.hbar__label{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar__track{height:10px;border-radius:20px;background:var(--panel-3);overflow:hidden}
.hbar__fill{height:100%;border-radius:20px;background:var(--accent)}
.hbar__val{font-family:var(--f-mono);font-weight:600;font-variant-numeric:tabular-nums;color:var(--ink-soft)}

/* ---------- Recipe cards ---------- */
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.recipe{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);display:flex;flex-direction:column;overflow:hidden}
.recipe__head{padding:15px 17px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.recipe__title{font-family:var(--f-display);font-weight:600;font-size:15.5px;letter-spacing:-.01em}
.recipe__meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px}
.recipe__body{padding:6px 17px 14px;flex:1}
.recipe__comp{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line);font-size:13px}
.recipe__comp:last-child{border-bottom:none}
.recipe__foot{padding:12px 17px;background:var(--panel-2);border-top:1px solid var(--line);display:flex;gap:8px;justify-content:flex-end}
.buildable{font-family:var(--f-mono);font-weight:700;color:var(--ok-ink)}

/* ---------- Alerts ---------- */
.alert-sec{margin-bottom:22px}
.alert-sec__title{display:flex;align-items:center;gap:9px;font-family:var(--f-display);font-weight:600;font-size:14px;margin-bottom:11px}
.alert-card{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--panel);border:1px solid var(--line);border-left-width:3px;border-radius:var(--r-sm);box-shadow:var(--shadow-sm);margin-bottom:9px}
.alert-card--crit{border-left-color:var(--crit)}
.alert-card--low{border-left-color:var(--low)}
.alert-card__body{flex:1;min-width:0}
.alert-card__title{font-weight:600;font-size:13.5px}
.alert-card__desc{font-size:12px;color:var(--ink-soft);margin-top:2px}

/* ---------- Production result ---------- */
.prod-banner{display:flex;align-items:center;gap:12px;padding:14px 17px;border-radius:var(--r-sm);font-weight:600;font-size:13.5px;margin-bottom:16px}
.prod-banner--ok{background:var(--ok-soft);color:var(--ok-ink)}
.prod-banner--short{background:var(--crit-soft);color:var(--crit-ink)}
.prod-banner svg{width:22px;height:22px;flex:none}
.short-tag{color:var(--crit-ink);font-weight:700}
.ok-tag{color:var(--ok-ink);font-weight:600}

/* ---------- Modal ---------- */
.modal-root{position:fixed;inset:0;z-index:100;display:none}
.modal-root.is-open{display:block}
.modal-overlay{position:absolute;inset:0;background:rgba(15,20,30,.5);backdrop-filter:blur(3px);animation:fade .18s ease}
.modal{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(620px,calc(100vw - 36px));max-height:calc(100vh - 60px);overflow:auto;
  background:var(--panel);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);animation:pop .2s cubic-bezier(.2,.9,.3,1.2);
}
.modal__head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px 14px;position:sticky;top:0;background:var(--panel);z-index:2;border-bottom:1px solid var(--line)}
.modal__head h2{margin:0;font-family:var(--f-display);font-size:18px;font-weight:600;letter-spacing:-.02em}
.modal__body{padding:20px 22px}
.modal__foot{padding:16px 22px 20px;display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid .full{grid-column:1/-1}
.comp-row{display:grid;grid-template-columns:1fr 92px 34px;gap:9px;align-items:end;margin-bottom:9px}
.hint{font-size:11.5px;color:var(--ink-faint);margin-top:4px}

/* ---------- Empty ---------- */
.empty{text-align:center;padding:46px 20px;color:var(--ink-soft)}
.empty__ico{width:52px;height:52px;border-radius:14px;background:var(--panel-3);display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;color:var(--ink-faint)}
.empty h4{margin:0 0 5px;font-family:var(--f-display);font-size:16px;color:var(--ink)}
.empty p{margin:0 0 16px;font-size:13px}

/* ---------- Toast ---------- */
.toast-wrap{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{background:var(--frame);color:#fff;padding:11px 18px;border-radius:var(--r-sm);box-shadow:var(--shadow-lg);font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;animation:toastIn .25s ease}
.toast svg{width:17px;height:17px;color:var(--accent)}

@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:translate(-50%,-46%) scale(.97)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.spin{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.btn[disabled]{pointer-events:none}
.wh-select{display:inline-flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line-strong);border-radius:var(--r-sm);padding:0 8px 0 11px;height:38px;box-shadow:var(--shadow-sm)}
.wh-select__ico{color:var(--accent-ink);display:flex}
.wh-select select{border:none;background:none;height:36px;font-weight:600;font-size:13px;outline:none;padding-right:2px;cursor:pointer;color:var(--ink);max-width:230px}
.badge--xfer{background:var(--accent-soft);color:var(--accent-ink)}
@media(max-width:640px){.wh-select select{max-width:130px}}
.ar{color:var(--ink-faint);font-weight:500;font-size:.92em}
.login-screen{position:fixed;inset:0;z-index:90;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(1100px 560px at 15% -10%,#243040,#141C2B 62%)}
.login-card{width:min(400px,100%);background:var(--panel);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);padding:32px 30px;animation:pop .25s ease}
.login-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.login-brand .brand__mark{width:40px;height:40px}
.login-title{font-family:var(--f-display);font-weight:700;font-size:20px;letter-spacing:-.02em}
.login-sub{color:var(--ink-soft);font-size:12.5px}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-family:var(--f-mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;margin-bottom:5px}
.login-field .control{height:42px}
.login-err{display:none;background:var(--crit-soft);color:var(--crit-ink);font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:8px;margin-bottom:14px}
.login-note{margin-top:16px;font-size:11px;color:var(--ink-faint);text-align:center;line-height:1.55}
.user-chip{display:flex;align-items:center;gap:10px}
.user-chip__av{width:32px;height:32px;border-radius:9px;background:var(--frame-3);display:flex;align-items:center;justify-content:center;color:var(--accent);flex:none}
.user-chip__meta{flex:1;min-width:0}
.user-chip__email{font-size:12px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-chip__role{font-size:10.5px;color:#7C8698}
.user-chip__out{width:30px;height:30px;border-radius:8px;color:#9AA6B8;display:flex;align-items:center;justify-content:center;flex:none}
.user-chip__out:hover{background:var(--frame-3);color:#fff}
.thumb{width:46px;height:46px;border-radius:8px;object-fit:cover;border:1px solid var(--line);cursor:pointer;background:var(--panel-3);flex:none}
.timeline{position:relative;padding-left:18px}
.timeline::before{content:"";position:absolute;left:4px;top:5px;bottom:5px;width:2px;background:var(--line)}
.tl-item{position:relative;padding:0 0 13px}
.tl-item::before{content:"";position:absolute;left:-18px;top:4px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 2px var(--panel)}
.perm-chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;font-family:var(--f-mono);background:var(--ok-soft);color:var(--ok-ink);text-transform:capitalize}
.perm-chip--off{background:var(--panel-3);color:var(--ink-faint);text-decoration:line-through}
.checkrow{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;cursor:pointer;user-select:none;font-size:13px}
.checkrow input{width:17px;height:17px;accent-color:var(--accent);flex:none}
.lightbox{position:fixed;inset:0;z-index:120;background:rgba(10,14,20,.86);display:flex;align-items:center;justify-content:center;padding:24px;cursor:zoom-out;animation:fade .18s ease}
.lightbox img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:var(--shadow-lg)}
.line-row{display:grid;gap:9px;align-items:end;margin-bottom:9px}
.invoice-drop{display:block;border:1.5px dashed var(--line-strong);border-radius:10px;padding:18px;text-align:center;color:var(--ink-soft);cursor:pointer;transition:.15s}
.invoice-drop:hover{border-color:var(--accent);background:var(--panel-2);color:var(--accent-ink)}
.invoice-preview{display:flex;align-items:center;gap:12px}
.invoice-preview img{width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.view-enter{animation:viewIn .28s ease}
@keyframes viewIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.scrim{display:none;position:fixed;inset:0;background:rgba(15,20,30,.4);z-index:35}

/* ---------- Responsive ---------- */
@media(max-width:1100px){.kpis{grid-template-columns:repeat(3,1fr)}.cols-2,.cols-2b{grid-template-columns:1fr}}
@media(max-width:900px){
  .layout{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;width:260px;transform:translateX(-100%);transition:transform .25s ease}
  body.nav-open .sidebar{transform:translateX(0)}
  body.nav-open .scrim{display:block}
  .hamburger{display:inline-flex}
  .content{padding:20px 18px 50px}
  .topbar{padding:13px 18px}
}
@media(max-width:640px){.kpis{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}.hbar__row{grid-template-columns:90px 1fr auto}}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

<script>
/* ============================================================
   StockDock — Warehouse ERP  (single-file, no dependencies)
   ============================================================ */
"use strict";

/* ---------- Icons ---------- */
const I = {

  x:'<path d="M18 6L6 18M6 6l12 12"/>',
  download:'<path d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"/>',
  upload:'<path d="M12 21V9m0 0l-4 4m4-4l4 4M4 3h16"/>',
  reset:'<path d="M3 12a9 9 0 109-9 9 9 0 00-6.7 3M3 3v4h4"/>',
  minus:'<path d="M5 12h14"/>',
  truck:'<path d="M1 3h13v13H1zM14 8h4l3 3v5h-7"/><circle cx="5.5" cy="18.5" r="1.5"/><circle cx="17.5" cy="18.5" r="1.5"/>',
  clock:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',

  users:'<circle cx="9" cy="8" r="3.4"/><path d="M2 20c0-3.3 3-5 7-5s7 1.7 7 5"/><path d="M16 4.5a3.4 3.4 0 010 6.8M17 15c3 .4 5 2 5 5"/>',
  lock:'<rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 018 0v3"/>',
  image:'<rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5-9 9"/>',
  history:'<path d="M3 12a9 9 0 109-9 9 9 0 00-6.7 3M3 3v4h4"/><path d="M12 8v4l3 2"/>',
  logout:'<path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><path d="M10 17l-5-5 5-5M5 12h11"/>',
  key:'<circle cx="8" cy="15" r="4"/><path d="M10.8 12.2L20 3m-3 0l3 3m-6 0l2 2"/>',

function svg(p,w){return '<svg viewBox="0 0 24 24" width="'+(w||18)+'" height="'+(w||18)+'" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">'+p+'</svg>';}

/* ---------- Nav config ---------- */
const NAV = [
  {group:'Overview'},
  {id:'dashboard',label:'Dashboard',icon:I.dashboard,title:'Dashboard',sub:'Live warehouse overview'},
  {id:'alerts',label:'Alerts',icon:I.bell,title:'Alerts',sub:'Everything needing attention',badge:true},
  {group:'Inventory'},
  {id:'inventory',label:'Inventory',icon:I.box,title:'Inventory',sub:'Raw materials & finished products'},
  {id:'warehouses',label:'Warehouses',icon:I.truck,title:'Warehouses',sub:'Stock by location & transfers'},
  {id:'flow',label:'Stock Flow',icon:I.flow,title:'Stock Flow',sub:'Receipts & consumption ledger'},
  {id:'reorder',label:'Reordering',icon:I.cart,title:'Reordering',sub:'Suggested purchase orders'},
  {group:'Production'},
  {id:'recipes',label:'Recipes',icon:I.recipe,title:'Recipes (BOM)',sub:'Bills of material per batch'},
  {id:'production',label:'Production & Count',icon:I.factory,title:'Production & Count',sub:'Explode recipes to raw materials'},
  {group:'Admin',adminOnly:true},
  {id:'access',label:'Access',icon:I.users,title:'Access Management',sub:'Users, warehouses & permissions',adminOnly:true},
  {group:'Insight'},
  {id:'analytics',label:'Analytics',icon:I.chart,title:'Analytics',sub:'Consumption, lead time & ABC'},
  {id:'settings',label:'Settings',icon:I.gear,title:'Settings',sub:'Currency & data management'},
];

/* ---------- State & persistence ---------- */
const STORE_KEY='stockdock.v1';
let state=null, memFallback=false;

function uid(p){return (p||'id')+'_'+Math.random().toString(36).slice(2,9);}
const today=new Date();
function dateStr(d){return d.toISOString().slice(0,10);}
function daysAgo(n){const x=new Date(today);x.setDate(x.getDate()-n);return x;}
function daysAgoStr(n){return dateStr(daysAgo(n));}

function saveState(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(state));}
  catch(e){memFallback=true;}
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(raw){state=JSON.parse(raw);migrate();return;}
  }catch(e){memFallback=true;}
  state=seedData();migrate();saveState();
}

/* ---------- Warehouses: defaults, distribution, migration ---------- */
function r2(n){return Math.round(n*100)/100;}
function DEFAULT_WHS(){return [
  {id:'wh1',name:'Namq Warehouse',tag:'Main'},
  {id:'wh2',name:'Raw Material Warehouse',tag:'LUNDA Factory'},
  {id:'wh3',name:'Production Warehouse',tag:'LUNDA Factory'},
  {id:'wh4',name:'Breehant Factory Warehouse',tag:''},
];}
function DEFAULT_USERS(){return [
  {id:'usr_admin',email:'Ibrahimnawaiseh45@gmail.com',password:'371993',role:'admin',warehouses:'all',perms:{stock:true,recipe:true,transfer:true},created:dateStr(today)}
];}
const SEED_AR={
  'FLR-001':'دقيق لجميع الأغراض','FLR-002':'دقيق القمح الكامل','SUG-001':'سكر أبيض','SUG-002':'سكر بني',
  'YST-001':'خميرة جافة','BKP-001':'بيكنج بودر','SLT-001':'ملح ناعم','BTR-001':'زبدة','MLK-001':'حليب كامل الدسم',
  'EGG-001':'بيض','OIL-001':'زيت نباتي','CHC-001':'مسحوق الكاكاو','VAN-001':'خلاصة الفانيليا','CHP-001':'رقائق الشوكولاتة',
  'PRD-BRD':'رغيف خبز أبيض','PRD-CRO':'كرواسون بالزبدة','PRD-CAK':'كيكة الشوكولاتة','PRD-MUF':'مافن التوت الأزرق'
};
function seedDistribute(type,total){
  const s={};
  if(type==='product'){s.wh1=r2(total*0.6);s.wh4=r2(total-s.wh1);}
  else{s.wh2=r2(total*0.65);s.wh1=r2(total*0.2);s.wh3=r2(total-s.wh2-s.wh1);}
  return s;
}
function migrate(){
  if(!state.warehouses||!state.warehouses.length)state.warehouses=DEFAULT_WHS();
  if(!state.users||!state.users.length)state.users=DEFAULT_USERS();
  if(!state.users.some(u=>u.role==='admin'))state.users[0].role='admin';
  state.users.forEach(u=>{if(!u.perms)u.perms={stock:true,recipe:true,transfer:true};if(u.warehouses===undefined)u.warehouses='all';});
  if(!state.receipts)state.receipts=[];
  const def=state.warehouses[0].id;
  (state.items||[]).forEach(it=>{
    if(!it.stocks||typeof it.stocks!=='object'){it.stocks={};it.stocks[def]=+it.stock||0;}
    delete it.stock;
    if(it.nameAr===undefined)it.nameAr='';
    if(!Array.isArray(it.priceHistory))it.priceHistory=[{date:dateStr(today),price:+it.price||0,by:'system',ref:'Initial'}];
  });
  (state.movements||[]).forEach(m=>{if(m.type!=='transfer'&&!m.whId)m.whId=def;});
  if(!state.production)state.production=[];
}

/* ---------- Seed data (bakery / food warehouse) ---------- *
 * Seeded stock values ARE the current on-hand result.
 * Seeded movements are historical records for analytics and do
 * NOT re-modify stock. Only user-entered movements adjust stock. */
function seedData(){
  const items=[
    // sku,name,category,unit,stock,price,supplier,leadTime,reorderPoint,safety,type
    ['FLR-001','All-Purpose Flour','Flour','kg',320,3.20,'Grain Co.',5,200,80,'raw'],
    ['FLR-002','Whole Wheat Flour','Flour','kg',88,3.80,'Grain Co.',5,120,50,'raw'],
    ['SUG-001','White Sugar','Sweetener','kg',146,2.50,'SweetSupply',7,100,40,'raw'],
    ['SUG-002','Brown Sugar','Sweetener','kg',62,3.10,'SweetSupply',7,60,20,'raw'],
    ['YST-001','Dry Yeast','Leavening','kg',6.4,18.00,'BakeChem',10,8,3,'raw'],
    ['BKP-001','Baking Powder','Leavening','kg',7.2,9.00,'BakeChem',10,6,2,'raw'],
    ['SLT-001','Fine Salt','Seasoning','kg',54,0.90,'SweetSupply',7,30,10,'raw'],
    ['BTR-001','Butter','Dairy','kg',12,14.00,'DairyPro',4,40,15,'raw'],
    ['MLK-001','Whole Milk','Dairy','L',58,2.20,'DairyPro',3,80,30,'raw'],
    ['EGG-001','Eggs','Egg','pcs',920,0.50,'FarmFresh',3,600,200,'raw'],
    ['OIL-001','Vegetable Oil','Oil','L',46,4.50,'OilMart',8,30,10,'raw'],
    ['CHC-001','Cocoa Powder','Flavoring','kg',11.5,22.00,'BakeChem',12,10,4,'raw'],
    ['VAN-001','Vanilla Extract','Flavoring','L',0.8,40.00,'BakeChem',14,4,1,'raw'],
    ['CHP-001','Chocolate Chips','Flavoring','kg',18,16.50,'BakeChem',12,15,5,'raw'],
    // finished products
    ['PRD-BRD','White Bread Loaf','Finished','pcs',46,6.00,'—',0,30,10,'product'],
    ['PRD-CRO','Butter Croissant','Finished','pcs',54,4.50,'—',0,40,15,'product'],
    ['PRD-CAK','Chocolate Cake','Finished','pcs',12,32.00,'—',0,15,5,'product'],
    ['PRD-MUF','Blueberry Muffin','Finished','pcs',80,3.00,'—',0,48,20,'product'],
  ].map(a=>({
    id:uid('itm'),sku:a[0],name:a[1],nameAr:SEED_AR[a[0]]||'',category:a[2],unit:a[3],price:a[5],
    supplier:a[6],leadTime:a[7],reorderPoint:a[8],safetyStock:a[9],type:a[10],
    stocks:seedDistribute(a[10],a[4]),
    priceHistory:[{date:daysAgoStr(30),price:a[5],by:'system',ref:'Initial'}]
  }));
  const bySku=s=>items.find(i=>i.sku===s).id;

  const recipes=[
    {id:uid('rcp'),name:'White Bread',productId:bySku('PRD-BRD'),batchSize:20,outUnit:'loaves',components:[
      [bySku('FLR-001'),10],[bySku('YST-001'),0.2],[bySku('SLT-001'),0.18],[bySku('SUG-001'),0.3],[bySku('OIL-001'),0.3]
    ]},
    {id:uid('rcp'),name:'Butter Croissant',productId:bySku('PRD-CRO'),batchSize:30,outUnit:'pcs',components:[
      [bySku('FLR-001'),6],[bySku('BTR-001'),3],[bySku('SUG-001'),0.6],[bySku('YST-001'),0.15],[bySku('MLK-001'),1.5],[bySku('SLT-001'),0.1],[bySku('EGG-001'),6]
    ]},
    {id:uid('rcp'),name:'Chocolate Cake',productId:bySku('PRD-CAK'),batchSize:10,outUnit:'cakes',components:[
      [bySku('FLR-001'),3],[bySku('SUG-001'),2.5],[bySku('CHC-001'),0.8],[bySku('BTR-001'),1.5],[bySku('EGG-001'),24],[bySku('MLK-001'),1],[bySku('BKP-001'),0.15],[bySku('VAN-001'),0.05]
    ]},
    {id:uid('rcp'),name:'Blueberry Muffin',productId:bySku('PRD-MUF'),batchSize:48,outUnit:'pcs',components:[
      [bySku('FLR-002'),4],[bySku('SUG-002'),2],[bySku('BTR-001'),1],[bySku('EGG-001'),12],[bySku('MLK-001'),1.2],[bySku('BKP-001'),0.2],[bySku('VAN-001'),0.03]
    ]},
  ].map(r=>({...r,components:r.components.map(c=>({itemId:c[0],qty:c[1]}))}));

  // historical movements: 30 days of consumption + periodic receipts
  const movements=[];
  const consumeProfile={ // avg daily consumption by sku (approx)
    'FLR-001':22,'FLR-002':4,'SUG-001':9,'SUG-002':3,'YST-001':0.5,'BKP-001':0.4,
    'SLT-001':1.2,'BTR-001':3.5,'MLK-001':4,'EGG-001':60,'OIL-001':1.5,
    'CHC-001':0.8,'VAN-001':0.25,'CHP-001':1.2
  };
  for(let d=29;d>=0;d--){
    const ds=daysAgoStr(d);
    const weekday=daysAgo(d).getDay();
    const factor=(weekday===5||weekday===6)?1.35:1; // busier weekends
    Object.keys(consumeProfile).forEach(sku=>{
      if(Math.random()<0.82){
        const base=consumeProfile[sku]*factor;
        const qty=+(base*(0.6+Math.random()*0.9)).toFixed(2);
        if(qty>0) movements.push({id:uid('mov'),date:ds,itemId:bySku(sku),type:'out',qty,whId:(d%2===0?'wh2':'wh3'),ref:'Production issue'});
      }
    });
  }
  // some receipts
  [['FLR-001',600,26],['SUG-001',300,24],['EGG-001',2400,20],['BTR-001',120,18],['MLK-001',200,15],['FLR-001',400,9],['CHC-001',40,12],['OIL-001',80,10],['FLR-002',200,22]]
    .forEach(r=>movements.push({id:uid('mov'),date:daysAgoStr(r[2]),itemId:bySku(r[0]),type:'in',qty:r[1],whId:'wh2',ref:'PO receipt · '+r[0]}));

  return {currency:'SAR',warehouses:DEFAULT_WHS(),users:DEFAULT_USERS(),receipts:[],items,recipes,movements,production:[]};
}

/* ---------- Warehouse scope helpers ---------- */
let currentWh='all';
function whById(id){return (state.warehouses||[]).find(w=>w.id===id);}
function whName(id){const w=whById(id);return w?w.name:'—';}
function stkAt(it,whId){return (it.stocks&&+it.stocks[whId])||0;}
function stkTotal(it){let s=0;for(const w of (state.warehouses||[]))s+=stkAt(it,w.id);return s;}
function stk(it){let s=0;for(const id of scopeWhs())s+=stkAt(it,id);return s;}
function haveOf(it,whId){return whId?stkAt(it,whId):stk(it);}
function addStk(it,whId,d){if(!it.stocks)it.stocks={};it.stocks[whId]=(+it.stocks[whId]||0)+d;}
function moveInScope(m){const s=scopeWhs();if(m.type==='transfer')return s.indexOf(m.fromWh)>=0||s.indexOf(m.toWh)>=0;return s.indexOf(m.whId)>=0;}

/* ---------- Domain helpers ---------- */
const itemById=id=>state.items.find(i=>i.id===id);
const recipeById=id=>state.recipes.find(r=>r.id===id);
function statusOf(it,whId){
  const s=whId!==undefined?stkAt(it,whId):stk(it);
  if(s<=it.safetyStock) return 'crit';
  if(s<=it.reorderPoint) return 'low';
  return 'ok';
}
const stockValue=it=>stk(it)*it.price;
function totalStockValue(){return state.items.reduce((a,i)=>a+stockValue(i),0);}
function consumedQty(id,days){
  const c=daysAgo(days);const s=scopeWhs();
  return state.movements.filter(m=>m.itemId===id&&m.type==='out'&&new Date(m.date)>=c&&s.indexOf(m.whId)>=0).reduce((a,m)=>a+m.qty,0);
}
function avgDaily(id,days){days=days||30;return consumedQty(id,days)/days;}
function consumptionValue(id,days){return consumedQty(id,days)*(itemById(id)?itemById(id).price:0);}
function reorderQty(it){
  if(it.type==='product') return 0;
  if(statusOf(it)==='ok') return 0;
  const ad=avgDaily(it.id,30);const s=stk(it);
  const byTarget=(it.reorderPoint+it.safetyStock)-s;
  const byLead=(ad*it.leadTime+it.safetyStock)-s;
  return Math.max(0,Math.ceil(Math.max(byTarget,byLead)));
}
function reorderList(){
  return state.items.filter(i=>i.type==='raw'&&statusOf(i)!=='ok').map(i=>({item:i,qty:reorderQty(i),cost:reorderQty(i)*i.price,status:statusOf(i)})).filter(r=>r.qty>0).sort((a,b)=>(a.status==='crit'?0:1)-(b.status==='crit'?0:1)||b.cost-a.cost);
}
function explode(recipeId,batches,fromWh){
  const r=recipeById(recipeId);if(!r)return[];
  return r.components.map(c=>{
    const it=itemById(c.itemId);const need=c.qty*batches;const have=it?haveOf(it,fromWh):0;
    return {item:it,perBatch:c.qty,need,have,short:Math.max(0,need-have),cost:(it?it.price:0)*need};
  });
}
function maxBuildable(recipeId,fromWh){
  const r=recipeById(recipeId);if(!r||!r.components.length)return 0;
  return Math.floor(Math.min(...r.components.map(c=>{const it=itemById(c.itemId);const have=it?haveOf(it,fromWh):0;return c.qty>0?have/c.qty:0;})));
}
function abcRows(){
  const days=90;
  const rows=state.items.filter(i=>i.type==='raw').map(it=>({item:it,val:consumptionValue(it.id,days)})).sort((a,b)=>b.val-a.val);
  const total=rows.reduce((a,r)=>a+r.val,0)||1;let cum=0;
  return rows.map(r=>{cum+=r.val;const cumPct=cum/total*100;return {...r,pct:r.val/total*100,cumPct,cls:cumPct<=70?'A':cumPct<=90?'B':'C'};});
}
function counts(){
  let low=0,crit=0;
  state.items.forEach(i=>{const s=statusOf(i);if(s==='crit')crit++;else if(s==='low')low++;});
  return {low,crit,attention:low+crit,reorders:reorderList().length};
}

const nfNum=new Intl.NumberFormat('en-US',{maximumFractionDigits:2});
const nfMoney=new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const nfInt=new Intl.NumberFormat('en-US',{maximumFractionDigits:0});

const money=n=>state.currency+' '+nfMoney.format(n||0);
const moneyK=n=>{n=n||0;if(Math.abs(n)>=1000)return state.currency+' '+nfInt.format(Math.round(n));return state.currency+' '+nfMoney.format(n);};
const esc=s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function bilingual(i){return esc(i.name)+(i.nameAr?' <span class="ar" dir="auto">'+esc(i.nameAr)+'</span>':'');}

/* ---------- Small components ---------- */
function badge(status){
  const m={ok:['ok','OK'],low:['low','Low'],crit:['crit','Critical']}[status];
  return '<span class="badge badge--'+m[0]+'"><span class="dot"></span>'+m[1]+'</span>';
}
function gaugeHTML(it){
  const st=statusOf(it);const cur=stk(it);
  const scale=Math.max(cur,it.reorderPoint*1.75,it.safetyStock*2,1);
  const pct=Math.min(100,cur/scale*100);
  const ropPct=Math.min(100,it.reorderPoint/scale*100);
  const safePct=Math.min(100,it.safetyStock/scale*100);
  return '<div class="gauge"><div class="gauge__track">'+
    '<div class="gauge__fill gauge__fill--'+st+'" style="width:'+pct.toFixed(1)+'%"></div>'+
    '<div class="gauge__mark gauge__mark--safe" style="left:'+safePct.toFixed(1)+'%" title="Safety stock"></div>'+
    '<div class="gauge__mark gauge__mark--rop" style="left:'+ropPct.toFixed(1)+'%" title="Reorder point"></div>'+
    '</div><div class="gauge__legend"><span>'+fmt(cur)+'</span><span>ROP '+fmt(it.reorderPoint)+'</span></div></div>';
}

/* ---------- Charts (SVG / CSS) ---------- */
function doughnut(segs){
  const total=segs.reduce((a,s)=>a+s.value,0);
  if(total<=0)return '<div class="empty" style="padding:20px">No data yet</div>';
  const r=60,cx=80,cy=80,w=22,C=2*Math.PI*r;let acc=0;
  let arcs='';
  segs.forEach(s=>{
    const dash=s.value/total*C;
    arcs+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="'+w+'" stroke-dasharray="'+dash.toFixed(2)+' '+(C-dash).toFixed(2)+'" stroke-dashoffset="'+(-acc).toFixed(2)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    acc+=dash;
  });
  const legend=segs.map(s=>'<div class="legend__row"><span class="legend__sw" style="background:'+s.color+'"></span><span>'+esc(s.label)+'</span><span class="legend__val">'+(s.value/total*100).toFixed(0)+'%</span></div>').join('');
  return '<div style="display:flex;gap:22px;align-items:center;flex-wrap:wrap">'+
    '<svg viewBox="0 0 160 160" width="160" height="160" style="flex:none">'+arcs+
    '<text x="80" y="76" text-anchor="middle" font-family="var(--f-mono)" font-size="12" fill="var(--ink-faint)">Total</text>'+
    '<text x="80" y="94" text-anchor="middle" font-family="var(--f-mono)" font-weight="700" font-size="15" fill="var(--ink)">'+moneyK(total)+'</text></svg>'+
    '<div class="legend" style="flex:1;min-width:150px">'+legend+'</div></div>';
}
function lineChart(points,opts){
  opts=opts||{};const W=560,H=210,pl=46,pr=14,pt=14,pb=28;
  const iw=W-pl-pr,ih=H-pt-pb;
  const max=Math.max(1,...points.map(p=>p.y));
  const niceMax=max<=0?1:max;
  const x=i=>pl+(points.length<=1?iw/2:i/(points.length-1)*iw);
  const y=v=>pt+ih-(v/niceMax)*ih;
  let grid='',ylabs='';
  for(let g=0;g<=4;g++){const gv=niceMax*g/4;const gy=y(gv);grid+='<line x1="'+pl+'" y1="'+gy+'" x2="'+(W-pr)+'" y2="'+gy+'" stroke="var(--line)" stroke-width="1"/>';ylabs+='<text x="'+(pl-8)+'" y="'+(gy+4)+'" text-anchor="end" font-family="var(--f-mono)" font-size="10" fill="var(--ink-faint)">'+(opts.money?moneyK(gv):fmt(gv))+'</text>';}
  const line=points.map((p,i)=>(i?'L':'M')+x(i).toFixed(1)+' '+y(p.y).toFixed(1)).join(' ');
  const area=line+' L'+x(points.length-1).toFixed(1)+' '+(pt+ih)+' L'+x(0).toFixed(1)+' '+(pt+ih)+' Z';
  let xlabs='';const step=Math.ceil(points.length/6);
  points.forEach((p,i)=>{if(i%step===0||i===points.length-1)xlabs+='<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" text-anchor="middle" font-family="var(--f-mono)" font-size="10" fill="var(--ink-faint)">'+esc(p.x)+'</text>';});
  const dots=points.map((p,i)=>'<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p.y).toFixed(1)+'" r="2.4" fill="var(--accent)"/>').join('');
  return '<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'">'+
    '<defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--accent)" stop-opacity=".22"/><stop offset="1" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>'+
    grid+'<path d="'+area+'" fill="url(#lg)"/><path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+dots+ylabs+xlabs+'</svg>';
}
function hbars(rows,opts){
  opts=opts||{};const max=Math.max(1,...rows.map(r=>r.value));
  if(!rows.length)return '<div class="empty" style="padding:20px">No data yet</div>';
  return '<div class="hbar">'+rows.map(r=>'<div class="hbar__row"><span class="hbar__label" title="'+esc(r.label)+'">'+esc(r.label)+'</span>'+
    '<div class="hbar__track"><div class="hbar__fill" style="width:'+(r.value/max*100).toFixed(1)+'%;background:'+(r.color||'var(--accent)')+'"></div></div>'+
    '<span class="hbar__val">'+(opts.money?moneyK(r.value):fmt(r.value))+(opts.suffix||'')+'</span></div>').join('')+'</div>';
}

  moves.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  moves=moves.slice(0,200);
  const priceOf=m=>m.qty*(itemById(m.itemId)?itemById(m.itemId).price:0);
  const inTot=scoped.filter(m=>m.type==='in').reduce((a,m)=>a+priceOf(m),0);
  const outTot=scoped.filter(m=>m.type==='out').reduce((a,m)=>a+priceOf(m),0);
  const scopeLabel=currentWh==='all'?'all warehouses':whName(currentWh);

  const cards='<div class="grid kpis" style="grid-template-columns:repeat(3,1fr)">'+
    [{cls:'ok',label:'Received (value)',val:moneyK(inTot),foot:scoped.filter(m=>m.type==='in').length+' receipts · '+esc(scopeLabel)},
     {cls:'ink',label:'Consumed (value)',val:moneyK(outTot),foot:scoped.filter(m=>m.type==='out').length+' issues'},
     {cls:'accent',label:'Movements',val:scoped.length,foot:'in scope'}]
    .map(k=>'<div class="kpi kpi--'+k.cls+'"><div class="kpi__accent"></div><div class="kpi__label">'+k.label+'</div><div class="kpi__val">'+k.val+'</div><div class="kpi__foot">'+k.foot+'</div></div>').join('')+'</div>';

  const toolbar='<div class="toolbar"><div class="seg">'+['all','in','out','transfer'].map(t=>'<button class="'+(uiState.flowFilter===t?'is-active':'')+'" onclick="app.flowFilter(\''+t+'\')">'+(t==='all'?'All':t==='in'?'In':t==='out'?'Out':'Transfers')+'</button>').join('')+'</div><div style="flex:1"></div><button class="btn" onclick="app.transferModal()">'+svg(I.flow,15)+'Transfer</button><button class="btn btn--accent" onclick="app.moveModal()">'+svg(I.plus,15)+'Record movement</button></div>';

  const rows=moves.length?moves.map(m=>{const it=itemById(m.itemId);const loc=m.type==='transfer'?(esc(whName(m.fromWh))+' → '+esc(whName(m.toWh))):esc(whName(m.whId));const tb=m.type==='in'?'<span class="badge badge--in">▲ In</span>':m.type==='out'?'<span class="badge badge--out">▼ Out</span>':'<span class="badge badge--xfer">⇄ Transfer</span>';const qtyTxt=m.type==='in'?'+'+fmt(m.qty):m.type==='out'?'−'+fmt(m.qty):fmt(m.qty);const qtyColor=m.type==='in'?'var(--ok-ink)':m.type==='transfer'?'var(--accent-ink)':'var(--ink)';return '<tr>'+
    '<td class="num" style="color:var(--ink-soft)">'+esc(m.date)+'</td>'+
    '<td><div class="cell-name">'+esc(it?it.name:'—')+'</div><div class="cell-sub cell-sku">'+esc(it?it.sku:'')+'</div></td>'+
    '<td class="t-center">'+tb+'</td>'+
    '<td style="color:var(--ink-soft);font-size:12px">'+loc+'</td>'+
    '<td class="t-right num" style="font-weight:600;color:'+qtyColor+'">'+qtyTxt+' '+esc(it?it.unit:'')+'</td>'+
    '<td class="t-right num">'+money(priceOf(m))+'</td>'+
    '<td style="color:var(--ink-soft)">'+esc(m.ref||'—')+'</td>'+
    '<td>'+((can('stock')||can('transfer'))?'<button class="icon-btn icon-btn--danger" title="Reverse & delete" onclick="app.deleteMove(\''+m.id+'\')">'+svg(I.trash,16)+'</button>':'')+'</td>'+
    '</tr>';}).join(''):'<tr><td colspan="8">'+emptyState(I.flow,'No movements in scope','Record a receipt, issue or transfer to build your ledger.','app.moveModal()','Record movement')+'</td></tr>';

  return cards+toolbar+'<div class="panel"><div class="table-wrap"><table class="data"><thead><tr><th>Date</th><th>Item</th><th class="t-center">Type</th><th>Location</th><th class="t-right">Quantity</th><th class="t-right">Value</th><th>Reference</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

/* ---------- Reorder ---------- */
function viewReorder(){
  const list=reorderList();
  const totCost=list.reduce((a,r)=>a+r.cost,0);
  // supplier summary
  const sup={};list.forEach(r=>{sup[r.item.supplier]=sup[r.item.supplier]||{items:0,cost:0};sup[r.item.supplier].items++;sup[r.item.supplier].cost+=r.cost;});
  const supRows=Object.keys(sup).sort((a,b)=>sup[b].cost-sup[a].cost);

  const head='<div class="grid kpis" style="grid-template-columns:repeat(3,1fr)">'+
    [{cls:'accent',label:'Items to Reorder',val:list.length,foot:'below reorder point'},
     {cls:'ink',label:'Total Est. Cost',val:moneyK(totCost),foot:'at current unit prices'},
     {cls:'low',label:'Suppliers Involved',val:supRows.length,foot:'to place orders with'}]
    .map(k=>'<div class="kpi kpi--'+k.cls+'"><div class="kpi__accent"></div><div class="kpi__label">'+k.label+'</div><div class="kpi__val">'+k.val+'</div><div class="kpi__foot">'+k.foot+'</div></div>').join('')+'</div>';

  if(!list.length)return head+'<div class="panel"><div class="panel__body">'+emptyState(I.check,'Nothing to reorder','Every raw material is above its reorder point. Nice and stocked.')+'</div></div>';

  const rows=list.map(r=>{const i=r.item;const ad=avgDaily(i.id,30);const cover=ad>0?(stk(i)/ad).toFixed(0):'∞';return '<tr>'+
    '<td><div class="cell-name">'+bilingual(i)+'</div><div class="cell-sub"><span class="cell-sku">'+esc(i.sku)+'</span> · '+esc(i.supplier)+'</div></td>'+
    '<td class="t-center">'+badge(r.status)+'</td>'+
    '<td class="t-right num">'+fmt(stk(i))+' '+esc(i.unit)+'</td>'+
    '<td class="t-right num" style="color:var(--ink-soft)">'+fmt(i.reorderPoint)+'</td>'+
    '<td class="t-right num" style="color:var(--ink-soft)">'+fmt(ad)+'/d</td>'+
    '<td class="t-right num" style="color:var(--ink-soft)">'+cover+'d</td>'+
    '<td class="t-right num">'+i.leadTime+'d</td>'+
    '<td class="t-right num" style="font-weight:700;color:var(--accent-ink)">'+fmt(r.qty)+' '+esc(i.unit)+'</td>'+
    '<td class="t-right num" style="font-weight:600">'+money(r.cost)+'</td>'+
    '<td>'+(can('stock')?'<button class="btn btn--sm" title="Log receipt of suggested qty" onclick="app.receiveReorder(\''+i.id+'\','+r.qty+')">'+svg(I.truck,14)+'Receive</button>':'')+'</td>'+
    '</tr>';}).join('');

  const supTable='<div class="panel" style="margin-top:16px"><div class="panel__head">'+svg(I.truck,18)+'<h3>By Supplier</h3></div><div class="table-wrap"><table class="data"><thead><tr><th>Supplier</th><th class="t-right">Line items</th><th class="t-right">Est. cost</th></tr></thead><tbody>'+supRows.map(s=>'<tr><td class="cell-name">'+esc(s)+'</td><td class="t-right num">'+sup[s].items+'</td><td class="t-right num" style="font-weight:600">'+money(sup[s].cost)+'</td></tr>').join('')+'</tbody></table></div></div>';

  return head+'<div class="panel"><div class="panel__head">'+svg(I.cart,18)+'<h3>Suggested Purchase Orders</h3><span class="sub">order-up-to = reorder point + safety, or lead-time demand + safety (whichever is higher)</span></div><div class="table-wrap"><table class="data"><thead><tr><th>Item</th><th class="t-center">Status</th><th class="t-right">On hand</th><th class="t-right">ROP</th><th class="t-right">Use/day</th><th class="t-right">Cover</th><th class="t-right">Lead</th><th class="t-right">Suggested</th><th class="t-right">Est. cost</th><th></th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr><td colspan="8" class="t-right" style="font-weight:600;padding:13px 14px">Total estimated cost</td><td class="t-right num" style="font-weight:700;font-size:14px">'+money(totCost)+'</td><td></td></tr></tfoot></table></div></div>'+supTable;
}

/* ---------- Recipes ---------- */
function viewRecipes(){
  if(!state.recipes.length)return '<div class="panel"><div class="panel__body">'+emptyState(I.recipe,'No recipes yet','Define a finished product as a bill of materials — quantities of raw materials per batch.','app.recipeModal()','New recipe')+'</div></div>';
  return '<div class="recipe-grid">'+state.recipes.map(r=>{
    const prod=itemById(r.productId);
    const batchCost=r.components.reduce((a,c)=>{const it=itemById(c.itemId);return a+(it?it.price:0)*c.qty;},0);
    const perUnit=r.batchSize>0?batchCost/r.batchSize:0;
    const mb=maxBuildable(r.id);
    const comps=r.components.map(c=>{const it=itemById(c.itemId);return '<div class="recipe__comp"><span>'+esc(it?it.name:'?')+'</span><span class="num" style="color:var(--ink-soft)">'+fmt(c.qty)+' '+esc(it?it.unit:'')+'</span></div>';}).join('');
    return '<div class="recipe">'+
      '<div class="recipe__head"><div class="brand__mark" style="box-shadow:inset 0 0 0 1.5px '+catColor('Finished')+';background:repeating-linear-gradient(45deg,#fff 0 5px,#F0F3F8 5px 10px)"></div><div style="flex:1"><div class="recipe__title">'+esc(r.name)+'</div><div class="recipe__meta">Yields '+fmt(r.batchSize)+' '+esc(r.outUnit)+' → '+esc(prod?prod.name:'—')+'</div></div></div>'+
      '<div class="recipe__body">'+comps+'</div>'+
      '<div style="padding:11px 17px;display:flex;justify-content:space-between;font-size:12px;border-top:1px dashed var(--line)"><span style="color:var(--ink-soft)">Batch cost <b class="num" style="color:var(--ink)">'+money(batchCost)+'</b></span><span style="color:var(--ink-soft)">Per unit <b class="num" style="color:var(--ink)">'+money(perUnit)+'</b></span></div>'+
      '<div style="padding:9px 17px;font-size:12px;background:var(--panel-2);border-top:1px solid var(--line)">Buildable now: <span class="buildable">'+fmt(mb*r.batchSize)+' '+esc(r.outUnit)+'</span> <span style="color:var(--ink-faint)">('+mb+' full '+(mb===1?'batch':'batches')+')</span></div>'+
      '<div class="recipe__foot">'+(can('stock')?'<button class="btn btn--sm" onclick="app.nav(\'production\');app.setProdRecipe(\''+r.id+'\')">'+svg(I.factory,14)+'Produce</button>':'')+(can('recipe')?'<button class="btn btn--sm btn--ghost" onclick="app.recipeModal(\''+r.id+'\')">'+svg(I.edit,14)+'Edit</button><button class="btn btn--sm btn--ghost btn--danger" onclick="app.deleteRecipe(\''+r.id+'\')">'+svg(I.trash,14)+'</button>':'')+'</div>'+
    '</div>';
  }).join('')+'</div>';
}

/* ---------- Production & Count ---------- */
function viewProduction(){
  if(!state.recipes.length)return '<div class="panel"><div class="panel__body">'+emptyState(I.recipe,'Add a recipe first','Production planning explodes a recipe into raw materials. Create a recipe to begin.','app.nav(\'recipes\')','Go to recipes')+'</div></div>';
  const rid=uiState.prodRecipe||state.recipes[0].id;
  const r=recipeById(rid);const batches=uiState.prodBatches||1;
  const fromWh=uiState.prodFromWh||'wh2';const toWh=uiState.prodToWh||'wh3';
  const whOpt=(sel)=>state.warehouses.map(w=>'<option value="'+w.id+'"'+(w.id===sel?' selected':'')+'>'+esc(w.name)+'</option>').join('');

  const planner='<div class="panel" style="margin-bottom:16px"><div class="panel__body"><div class="form-grid" style="grid-template-columns:2fr 1fr;align-items:end">'+
    '<div class="field"><label>Recipe</label><select class="control" onchange="app.setProdRecipe(this.value)">'+state.recipes.map(x=>'<option value="'+x.id+'"'+(x.id===rid?' selected':'')+'>'+esc(x.name)+' (yields '+fmt(x.batchSize)+' '+esc(x.outUnit)+')</option>').join('')+'</select></div>'+
    '<div class="field"><label>Batches to produce</label><input type="number" min="0" step="0.5" class="control num" value="'+batches+'" oninput="app.setProdBatches(this.value)"></div>'+
    '<div class="field"><label>Draw materials from</label><select class="control" onchange="app.setProdFromWh(this.value)">'+whOpt(fromWh)+'</select></div>'+
    '<div class="field"><label>Add finished goods to</label><select class="control" onchange="app.setProdToWh(this.value)">'+whOpt(toWh)+'</select></div>'+
    '</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:10px"><div class="hint" style="margin:0">Yields '+fmt(r.batchSize*batches)+' '+esc(r.outUnit)+' · Buildable from '+esc(whName(fromWh))+': <b>'+fmt(maxBuildable(rid,fromWh)*r.batchSize)+' '+esc(r.outUnit)+'</b></div><button class="btn btn--accent" onclick="app.runProduction()">'+svg(I.factory,15)+'Calculate needs</button></div></div></div>';

  let result='';
  const res=uiState.prodResult;
  if(res&&res.recipeId===rid&&res.batches===batches){
    const rows=res.rows.map(x=>'<tr>'+
      '<td><div class="cell-name">'+esc(x.item?x.item.name:'?')+'</div><div class="cell-sub cell-sku">'+esc(x.item?x.item.sku:'')+'</div></td>'+
      '<td class="t-right num" style="color:var(--ink-soft)">'+fmt(x.perBatch)+' '+esc(x.item?x.item.unit:'')+'</td>'+
      '<td class="t-right num" style="font-weight:600">'+fmt(x.need)+' '+esc(x.item?x.item.unit:'')+'</td>'+
      '<td class="t-right num">'+fmt(x.have)+' '+esc(x.item?x.item.unit:'')+'</td>'+
      '<td class="t-right num '+(x.short>0?'short-tag':'ok-tag')+'">'+(x.short>0?'−'+fmt(x.short):'✓ ok')+'</td>'+
      '<td class="t-right num">'+money(x.cost)+'</td>'+
    '</tr>').join('');
    const totalCost=res.rows.reduce((a,x)=>a+x.cost,0);
    const shorts=res.rows.filter(x=>x.short>0);
    const banner=shorts.length?'<div class="prod-banner prod-banner--short">'+svg(I.warn,22)+'<div>Not enough stock in '+esc(whName(fromWh))+' for '+fmt(batches)+' '+(batches===1?'batch':'batches')+'. Short on '+shorts.length+' material'+(shorts.length>1?'s':'')+': '+shorts.map(s=>esc(s.item.name)).join(', ')+'.</div></div>':'<div class="prod-banner prod-banner--ok">'+svg(I.check,22)+'<div>All materials available in '+esc(whName(fromWh))+'. Producing moves '+fmt(r.batchSize*batches)+' '+esc(r.outUnit)+' into '+esc(whName(toWh))+'.</div></div>';
    result='<div class="panel"><div class="panel__head">'+svg(I.factory,18)+'<h3>Material Requirements</h3><span class="sub">recipe exploded × '+fmt(batches)+' '+(batches===1?'batch':'batches')+'</span>'+
      '<span style="margin-left:auto">'+((shorts.length||!can('stock'))?'':'<button class="btn btn--accent btn--sm" onclick="app.produceDeduct()">'+svg(I.check,14)+'Produce & deduct stock</button>')+'</span></div>'+
      '<div class="panel__body" style="padding-bottom:0">'+banner+'</div>'+
      '<div class="table-wrap"><table class="data"><thead><tr><th>Material</th><th class="t-right">Per batch</th><th class="t-right">Required</th><th class="t-right">On hand</th><th class="t-right">Shortfall</th><th class="t-right">Cost</th></tr></thead><tbody>'+rows+'</tbody><tfoot><tr><td colspan="5" class="t-right" style="font-weight:600;padding:13px 14px">Total material cost</td><td class="t-right num" style="font-weight:700;font-size:14px">'+money(totalCost)+'</td></tr></tfoot></table></div>'+
      (shorts.length?'<div class="panel__body" style="border-top:1px solid var(--line)"><button class="btn btn--sm" onclick="app.nav(\'reorder\')">'+svg(I.cart,14)+'View reorder suggestions</button></div>':'')+
    '</div>';
  }else{
    result='<div class="panel"><div class="panel__body">'+emptyState(I.factory,'Set a quantity and calculate','Choose a recipe and number of batches, then calculate to see exactly which raw materials — and how much of each — you need.','app.runProduction()','Calculate needs')+'</div></div>';
  }

  // production history
  const hist=state.production.slice().reverse().slice(0,10);
  const histHTML=hist.length?'<div class="panel" style="margin-top:16px"><div class="panel__head">'+svg(I.clock,18)+'<h3>Production Log</h3></div><div class="table-wrap"><table class="data"><thead><tr><th>Date</th><th>Recipe</th><th class="t-right">Batches</th><th class="t-right">Output</th><th class="t-right">Material cost</th></tr></thead><tbody>'+hist.map(h=>'<tr><td class="num" style="color:var(--ink-soft)">'+esc(h.date)+'</td><td class="cell-name">'+esc(h.recipeName)+'</td><td class="t-right num">'+fmt(h.batches)+'</td><td class="t-right num">'+fmt(h.output)+' '+esc(h.outUnit)+'</td><td class="t-right num">'+money(h.cost)+'</td></tr>').join('')+'</tbody></table></div></div>':'';

  return planner+result+histHTML;
}

/* ---------- Analytics ---------- */
function viewAnalytics(){
  const p=uiState.anaPeriod;
  const seg='<div class="toolbar"><span class="eyebrow" style="margin-right:4px">Period</span><div class="seg">'+[7,30,90].map(d=>'<button class="'+(p===d?'is-active':'')+'" onclick="app.anaPeriod('+d+')">'+d+' days</button>').join('')+'</div></div>';

  // consumption trend for period (value/day)
  const trend=[];for(let d=p-1;d>=0;d--){const ds=daysAgoStr(d);const v=state.movements.filter(m=>m.type==='out'&&m.date===ds&&scopeWhs().indexOf(m.whId)>=0).reduce((a,m)=>{const it=itemById(m.itemId);return a+m.qty*(it?it.price:0);},0);const dt=new Date(ds);trend.push({x:dt.getDate()+'/'+(dt.getMonth()+1),y:v});}

  const topQty=state.items.filter(i=>i.type==='raw').map(i=>({label:i.name,value:consumedQty(i.id,p),color:catColor(i.category),unit:i.unit})).sort((a,b)=>b.value-a.value).slice(0,8);
  const catAgg={};state.items.forEach(i=>{catAgg[i.category]=(catAgg[i.category]||0)+stockValue(i);});
  const segs=Object.keys(catAgg).map(k=>({label:k,value:catAgg[k],color:catColor(k)})).sort((a,b)=>b.value-a.value);
  const lead=state.items.filter(i=>i.type==='raw').map(i=>({label:i.name,value:i.leadTime,color:'#64748B'})).sort((a,b)=>b.value-a.value).slice(0,8);

  const abc=abcRows();
  const cCount={A:0,B:0,C:0},cVal={A:0,B:0,C:0};abc.forEach(r=>{cCount[r.cls]++;cVal[r.cls]+=r.val;});
  const abcRowsHTML=abc.map(r=>'<tr><td class="t-center"><span class="abc abc--'+r.cls+'">'+r.cls+'</span></td><td><div class="cell-name">'+esc(r.item.name)+'</div><div class="cell-sub cell-sku">'+esc(r.item.sku)+'</div></td><td class="t-right num">'+money(r.val)+'</td><td class="t-right num">'+r.pct.toFixed(1)+'%</td><td class="t-right num" style="color:var(--ink-soft)">'+r.cumPct.toFixed(1)+'%</td></tr>').join('');

  return seg+
    '<div class="grid cols-2" style="margin-bottom:16px">'+
      '<div class="panel"><div class="panel__head">'+svg(I.chart,18)+'<h3>Consumption Trend</h3><span class="sub">value issued · '+p+' days</span></div><div class="panel__body">'+lineChart(trend,{money:true})+'</div></div>'+
      '<div class="panel"><div class="panel__head">'+svg(I.box,18)+'<h3>Inventory Value by Category</h3></div><div class="panel__body">'+doughnut(segs)+'</div></div>'+
    '</div>'+
    '<div class="grid cols-2" style="margin-bottom:16px">'+
      '<div class="panel"><div class="panel__head">'+svg(I.flow,18)+'<h3>Top Consumed Materials</h3><span class="sub">quantity · '+p+' days</span></div><div class="panel__body">'+hbars(topQty,{})+'</div></div>'+
      '<div class="panel"><div class="panel__head">'+svg(I.clock,18)+'<h3>Supplier Lead Times</h3><span class="sub">days</span></div><div class="panel__body">'+hbars(lead,{suffix:'d'})+'</div></div>'+
    '</div>'+
    '<div class="panel"><div class="panel__head">'+svg(I.chart,18)+'<h3>ABC Classification</h3><span class="sub">by consumption value · 90 days</span>'+
      '<span style="margin-left:auto;display:flex;gap:8px">'+
      '<span class="tag">A · '+cCount.A+' items · '+moneyK(cVal.A)+'</span><span class="tag">B · '+cCount.B+'</span><span class="tag">C · '+cCount.C+'</span></span></div>'+
      '<div class="table-wrap"><table class="data"><thead><tr><th class="t-center">Class</th><th>Material</th><th class="t-right">Consumption value</th><th class="t-right">Share</th><th class="t-right">Cumulative</th></tr></thead><tbody>'+abcRowsHTML+'</tbody></table></div>'+
      '<div class="panel__body" style="border-top:1px solid var(--line);color:var(--ink-soft);font-size:12.5px">Class <b>A</b> = top 70% of consumption value (tight control, frequent review). <b>B</b> = next 20%. <b>C</b> = remaining 10% (bulk orders, loose control).</div>'+
    '</div>';
}

/* ---------- Alerts ---------- */
function viewAlerts(){
  const crit=state.items.filter(i=>statusOf(i)==='crit');
  const low=state.items.filter(i=>statusOf(i)==='low');
  const c=counts();
  const head='<div class="grid kpis" style="grid-template-columns:repeat(3,1fr)">'+
    [{cls:'crit',label:'Critical',val:crit.length,foot:'at or below safety stock'},
     {cls:'low',label:'Low',val:low.length,foot:'at or below reorder point'},
     {cls:'accent',label:'Reorder Value',val:moneyK(reorderList().reduce((a,r)=>a+r.cost,0)),foot:'to bring all back to target'}]
    .map(k=>'<div class="kpi kpi--'+k.cls+'"><div class="kpi__accent"></div><div class="kpi__label">'+k.label+'</div><div class="kpi__val">'+k.val+'</div><div class="kpi__foot">'+k.foot+'</div></div>').join('')+'</div>';

  if(!crit.length&&!low.length)return head+'<div class="panel"><div class="panel__body">'+emptyState(I.check,'All clear','No critical or low-stock items. Your warehouse is in good shape.')+'</div></div>';

  function card(i){const q=reorderQty(i);const ad=avgDaily(i.id,30);const cover=ad>0?Math.floor(stk(i)/ad)+' days of cover left':'no recent consumption';return '<div class="alert-card alert-card--'+statusOf(i)+'"><div style="width:150px">'+gaugeHTML(i)+'</div><div class="alert-card__body"><div class="alert-card__title">'+esc(i.name)+' <span class="cell-sku">'+esc(i.sku)+'</span></div><div class="alert-card__desc">On hand '+fmt(stk(i))+' '+esc(i.unit)+' · ROP '+fmt(i.reorderPoint)+' · safety '+fmt(i.safetyStock)+' · '+cover+'</div></div>'+(i.type==='raw'&&q>0?'<div style="text-align:right"><div class="eyebrow">Suggested</div><div class="num" style="font-weight:700;color:var(--accent-ink);font-size:15px">'+fmt(q)+' '+esc(i.unit)+'</div>'+(can('stock')?'<button class="btn btn--sm" style="margin-top:6px" onclick="app.receiveReorder(\''+i.id+'\','+q+')">'+svg(I.truck,13)+'Receive</button>':'')+'</div>':'<span class="badge badge--muted">finished good</span>')+'</div>';}

  let html=head;
  if(crit.length)html+='<div class="alert-sec"><div class="alert-sec__title" style="color:var(--crit-ink)">'+svg(I.warn,18)+'Critical — '+crit.length+'</div>'+crit.map(card).join('')+'</div>';
  if(low.length)html+='<div class="alert-sec"><div class="alert-sec__title" style="color:var(--low-ink)">'+svg(I.bell,18)+'Low — '+low.length+'</div>'+low.map(card).join('')+'</div>';
  return html;
}

function saveItem(id){
  const sku=val('f_sku'),name=val('f_name');
  if(!name){toast('Item name is required');return;}
  const allowed=allowedWhs();
  const stocks=id?Object.assign({},itemById(id).stocks||{}):{};
  state.warehouses.forEach(w=>{const el=document.getElementById('f_stock_'+w.id);if(el&&!isAdmin()&&allowed.indexOf(w.id)<0)return;if(el&&el.value.trim()!=='')stocks[w.id]=parseFloat(el.value)||0;else if(el&&el.value.trim()==='')delete stocks[w.id];});
  const price=numval('f_price');
  const data={sku:sku||'SKU-'+Math.floor(Math.random()*9000+1000),name,nameAr:val('f_nameAr'),type:val('f_type'),category:val('f_category')||'Uncategorized',unit:val('f_unit')||'unit',price,stocks,supplier:val('f_supplier')||'—',leadTime:Math.round(numval('f_lead')),reorderPoint:numval('f_rop'),safetyStock:numval('f_safety')};
  if(id){const ex=itemById(id);const oldPrice=+ex.price;Object.assign(ex,data);if(oldPrice!==price)logPrice(ex,price,'Manual edit');toast('Item updated');}
  else{const it={id:uid('itm'),...data,priceHistory:[{date:dateStr(today),price,by:currentUser?currentUser.email:'system',ref:'Created'}]};state.items.push(it);toast('Item added');}
  saveState();closeModal();render();
}
function deleteItem(id){
  if(!can('stock')){toast('You do not have permission');return;}
  const it=itemById(id);
  const usedIn=state.recipes.filter(r=>r.productId===id||r.components.some(c=>c.itemId===id)).map(r=>r.name);
  let msg='Delete "'+it.name+'"? This also removes its movement history.';
  if(usedIn.length)msg+='\n\nIt is used in recipes: '+usedIn.join(', ')+'. Those references will break.';
  if(!confirm(msg))return;
  state.items=state.items.filter(i=>i.id!==id);
  state.movements=state.movements.filter(m=>m.itemId!==id);
  saveState();render();toast('Item deleted');
}

function moveModal(){
  if(!can('stock')){toast('You do not have permission to change stock');return;}

  const items=state.items.slice().sort((a,b)=>a.name.localeCompare(b.name));
  const allowed=allowedWhs();const defWh=(currentWh!=='all'&&canSeeWh(currentWh))?currentWh:allowed[0];
  const whOpts=sel=>allowed.map(id=>'<option value="'+id+'"'+(id===sel?' selected':'')+'>'+esc(whName(id))+'</option>').join('');
  const body='<div class="modal"><div class="modal__head"><h2>Issue stock</h2><button class="icon-btn" onclick="app.closeModal()">'+svg(I.x,18)+'</button></div>'+
    '<div class="modal__body"><div class="form-grid">'+
    '<div class="field full"><label>Item</label><select id="f_item" class="control">'+items.map(i=>'<option value="'+i.id+'">'+esc(i.name)+' ('+esc(i.sku)+') · total '+fmt(stkTotal(i))+' '+esc(i.unit)+'</option>').join('')+'</select></div>'+
    '<div class="field"><label>From warehouse</label><select id="f_wh" class="control">'+whOpts(defWh)+'</select></div>'+
    '<div class="field"><label>Quantity to issue</label><input id="f_qty" type="number" min="0" step="0.01" class="control num" placeholder="0"></div>'+
    '<div class="field"><label>Date</label><input id="f_date" type="date" class="control num" value="'+dateStr(today)+'"></div>'+
    '<div class="field"><label>Reference (optional)</label><input id="f_ref" class="control" placeholder="Batch, order, note…"></div>'+
    '</div><div class="hint">Issuing subtracts stock (consumption). To add stock use “Receive stock” — it records the invoice photo.</div></div>'+
    '<div class="modal__foot"><button class="btn btn--ghost" onclick="app.closeModal()">Cancel</button><button class="btn btn--accent" onclick="app.saveMove()">'+svg(I.check,15)+'Issue</button></div></div>';
  openModal(body);
}
function saveMove(){
  const itemId=val('f_item'),qty=numval('f_qty'),wh=val('f_wh');
  if(qty<=0){toast('Enter a quantity greater than zero');return;}
  const it=itemById(itemId);
  if(qty>stkAt(it,wh)&&!confirm('This issues '+fmt(qty)+' '+it.unit+' from '+whName(wh)+' but only '+fmt(stkAt(it,wh))+' is there. Stock will go negative. Continue?'))return;
  addStk(it,wh,-qty);
  state.movements.push({id:uid('mov'),date:val('f_date')||dateStr(today),itemId,type:'out',qty,whId:wh,ref:val('f_ref')||'Manual issue'});
  saveState();closeModal();render();toast('Stock issued · '+whName(wh));
}
function deleteMove(id){
  const m=state.movements.find(x=>x.id===id);if(!m)return;
  if(!confirm('Delete this movement and reverse its stock effect?'))return;
  const it=itemById(m.itemId);
  if(it){if(m.type==='transfer'){addStk(it,m.fromWh,m.qty);addStk(it,m.toWh,-m.qty);}else{addStk(it,m.whId,m.type==='in'?-m.qty:m.qty);}}
  state.movements=state.movements.filter(x=>x.id!==id);
  saveState();render();toast('Movement reversed');
}
function transferModal(itemId){
  if(!can('transfer')){toast('You do not have permission to transfer stock');return;}
  if(!state.items.length){toast('Add an item first');app.nav('inventory');return;}
  if(state.warehouses.length<2){toast('You need at least two warehouses to transfer');return;}
  const items=state.items.slice().sort((a,b)=>a.name.localeCompare(b.name));
  const sel=itemId||items[0].id;
  const from=currentWh!=='all'?currentWh:'wh2';
  const to=state.warehouses.find(w=>w.id!==from).id;
  const whOpts=selId=>state.warehouses.map(w=>'<option value="'+w.id+'"'+(w.id===selId?' selected':'')+'>'+esc(w.name)+'</option>').join('');
  const body='<div class="modal"><div class="modal__head"><h2>Transfer stock</h2><button class="icon-btn" onclick="app.closeModal()">'+svg(I.x,18)+'</button></div>'+
    '<div class="modal__body"><div class="form-grid">'+
    '<div class="field full"><label>Item</label><select id="f_titem" class="control">'+items.map(i=>'<option value="'+i.id+'"'+(i.id===sel?' selected':'')+'>'+esc(i.name)+' ('+esc(i.sku)+')</option>').join('')+'</select></div>'+
    '<div class="field"><label>From warehouse</label><select id="f_tfrom" class="control">'+whOpts(from)+'</select></div>'+
    '<div class="field"><label>To warehouse</label><select id="f_tto" class="control">'+whOpts(to)+'</select></div>'+
    '<div class="field"><label>Quantity</label><input id="f_tqty" type="number" min="0" step="0.01" class="control num" placeholder="0"></div>'+
    '<div class="field"><label>Date</label><input id="f_tdate" type="date" class="control num" value="'+dateStr(today)+'"></div>'+
    '<div class="field full"><label>Reference (optional)</label><input id="f_tref" class="control" placeholder="Transfer note…"></div>'+
    '</div><div class="hint">Moves stock out of one warehouse and into another. Item totals stay the same.</div></div>'+
    '<div class="modal__foot"><button class="btn btn--ghost" onclick="app.closeModal()">Cancel</button><button class="btn btn--accent" onclick="app.saveTransfer()">'+svg(I.flow,15)+'Transfer</button></div></div>';
  openModal(body);
}
function saveTransfer(){
  const it=itemById(val('f_titem')),from=val('f_tfrom'),to=val('f_tto'),qty=numval('f_tqty');
  if(from===to){toast('Choose two different warehouses');return;}
  if(qty<=0){toast('Enter a quantity greater than zero');return;}
  if(qty>stkAt(it,from)&&!confirm('Only '+fmt(stkAt(it,from))+' '+it.unit+' in '+whName(from)+'. Transfer anyway (goes negative)?'))return;
  addStk(it,from,-qty);addStk(it,to,qty);
  state.movements.push({id:uid('mov'),date:val('f_tdate')||dateStr(today),itemId:it.id,type:'transfer',qty,fromWh:from,toWh:to,ref:val('f_tref')||'Transfer'});
  saveState();closeModal();render();toast('Transferred '+fmt(qty)+' '+it.unit+' → '+whName(to));
}

function recipeModal(id){
  if(!can('recipe')){toast('You do not have permission to edit recipes');return;}

function renderComps(){
  const raws=state.items.filter(i=>i.type==='raw').sort((a,b)=>a.name.localeCompare(b.name));
  document.getElementById('comp-list').innerHTML=modalComponents.map((c,idx)=>'<div class="comp-row">'+
