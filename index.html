let importCtx=null, __xlsxP=null;
function loadXLSX(){
  if(window.XLSX)return Promise.resolve(window.XLSX);
  if(__xlsxP)return __xlsxP;
  __xlsxP=new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';s.async=true;
    s.onload=()=>window.XLSX?res(window.XLSX):(rej(new Error('Excel reader failed to load')));
    s.onerror=()=>{__xlsxP=null;rej(new Error('Excel reader failed to load'));};
    document.head.appendChild(s);
  });
  return __xlsxP;
}
function toNum(v){if(typeof v==='number')return isFinite(v)?v:0;const n=parseFloat(String(v).replace(/[^0-9.\-]/g,''));return isNaN(n)?0:n;}
function normHdr(h){return String(h==null?'':h).toLowerCase().replace(/[^a-z0-9]/g,'');}
function colIndex(headers,cands){const H=headers.map(normHdr);for(const c of cands){const idx=H.indexOf(normHdr(c));if(idx>=0)return idx;}return -1;}
function parseCSV(text,delim){delim=delim||',';const rows=[];let field='',row=[],inQ=false;for(let i=0;i<text.length;i++){const c=text[i];if(inQ){if(c==='"'){if(text[i+1]==='"'){field+='"';i++;}else inQ=false;}else field+=c;}else{if(c==='"')inQ=true;else if(c===delim){row.push(field);field='';}else if(c==='\n'){row.push(field);rows.push(row);row=[];field='';}else if(c==='\r'){}else field+=c;}}if(field!==''||row.length){row.push(field);rows.push(row);}return rows.filter(r=>!(r.length===1&&String(r[0]).trim()===''));}
function readText(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('Could not read file'));r.readAsText(f);});}
function readBuf(f){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error('Could not read file'));r.readAsArrayBuffer(f);});}
async function readFileToRows(f){
  const nm=(f.name||'').toLowerCase();
  if(nm.endsWith('.csv')||nm.endsWith('.tsv')||nm.endsWith('.txt')){const t=await readText(f);return parseCSV(t,nm.endsWith('.tsv')?'\t':',');}
  const XLSX=await loadXLSX();const buf=await readBuf(f);const wb=XLSX.read(buf,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];return XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:false});
}
function parseStocks(rows){
  const headers=rows[0]||[];
  const ci={sku:colIndex(headers,['sku','code','itemcode','item']),name:colIndex(headers,['name','itemname','description','productname']),type:colIndex(headers,['type','kind']),category:colIndex(headers,['category','cat','group']),unit:colIndex(headers,['unit','uom','unitofmeasure']),price:colIndex(headers,['unitprice','price','cost','unitcost']),stock:colIndex(headers,['currentstock','stock','onhand','quantity','qty','onhandqty','balance']),supplier:colIndex(headers,['supplier','vendor']),lead:colIndex(headers,['leadtime','leadtimedays','leaddays','lead']),rop:colIndex(headers,['reorderpoint','rop','reorder','reorderlevel','min','minimum']),safety:colIndex(headers,['safetystock','safety','safetystocklevel','buffer'])};
  const has=k=>ci[k]>=0;const items=[],errors=[];
  for(let r=1;r<rows.length;r++){const row=rows[r]||[];if(row.every(c=>String(c).trim()===''))continue;const cell=k=>has(k)?row[ci[k]]:'';const sku=String(cell('sku')).trim();const name=String(cell('name')).trim();if(!sku&&!name){errors.push('Row '+(r+1)+': no SKU or name — skipped');continue;}const patch={};if(name)patch.name=name;if(sku)patch.sku=sku;if(has('type')&&String(cell('type')).trim()){const t=String(cell('type')).trim().toLowerCase();patch.type=(t[0]==='p'||t.indexOf('finish')>=0||t.indexOf('prod')>=0)?'product':'raw';}if(has('category')&&String(cell('category')).trim())patch.category=String(cell('category')).trim();if(has('unit')&&String(cell('unit')).trim())patch.unit=String(cell('unit')).trim();if(has('supplier')&&String(cell('supplier')).trim())patch.supplier=String(cell('supplier')).trim();if(has('price')&&String(cell('price')).trim()!=='')patch.price=toNum(cell('price'));if(has('stock')&&String(cell('stock')).trim()!=='')patch.stock=toNum(cell('stock'));if(has('lead')&&String(cell('lead')).trim()!=='')patch.leadTime=Math.round(toNum(cell('lead')));if(has('rop')&&String(cell('rop')).trim()!=='')patch.reorderPoint=toNum(cell('rop'));if(has('safety')&&String(cell('safety')).trim()!=='')patch.safetyStock=toNum(cell('safety'));items.push({sku,name,patch});}
  return {items,errors,headers};
}
function parseRecipes(rows){
  const headers=rows[0]||[];
  const ci={recipe:colIndex(headers,['recipename','recipe','name']),psku:colIndex(headers,['productsku','producesproductsku','produces','productcode','outputsku','finishedgoodsku','product']),pname:colIndex(headers,['productname','finishedproduct','outputname','producesname']),batch:colIndex(headers,['batchsize','batch','batchyield','yields','yield','yieldqty']),outUnit:colIndex(headers,['outputunit','outunit','yieldunit','unit']),msku:colIndex(headers,['materialsku','rawmaterialsku','componentsku','ingredientsku','material','component','ingredient','rawmaterial']),qty:colIndex(headers,['quantityperbatch','qtyperbatch','quantity','qty','amount','perbatch'])};
  const has=k=>ci[k]>=0;const groups={},order=[],errors=[];
  for(let r=1;r<rows.length;r++){const row=rows[r]||[];if(row.every(c=>String(c).trim()===''))continue;const cell=k=>has(k)?row[ci[k]]:'';const rn=String(cell('recipe')).trim();if(!rn){errors.push('Row '+(r+1)+': missing recipe name — skipped');continue;}const key=rn.toLowerCase();if(!groups[key]){groups[key]={name:rn,productSku:'',productName:'',batchSize:0,outUnit:'',components:[]};order.push(key);}const g=groups[key];if(!g.productSku&&String(cell('psku')).trim())g.productSku=String(cell('psku')).trim();if(!g.productName&&String(cell('pname')).trim())g.productName=String(cell('pname')).trim();if(!g.batchSize){const b=toNum(cell('batch'));if(b>0)g.batchSize=b;}if(!g.outUnit&&String(cell('outUnit')).trim())g.outUnit=String(cell('outUnit')).trim();const ms=String(cell('msku')).trim();const q=toNum(cell('qty'));if(ms&&q>0)g.components.push({sku:ms,qty:q});else if(ms&&q<=0)errors.push('Row '+(r+1)+': "'+ms+'" has no quantity — skipped');}
  return {recipes:order.map(k=>groups[k]),errors,headers};
}
function findItemBySku(sku){const s=String(sku).toLowerCase();return state.items.find(i=>String(i.sku).toLowerCase()===s);}
function applyStocks(parsed){const target=currentWh!=='all'?currentWh:(state.warehouses[0]?state.warehouses[0].id:'wh1');let added=0,updated=0;parsed.items.forEach(u=>{const patch=Object.assign({},u.patch);const hasStock=patch.stock!==undefined;const stockVal=patch.stock;delete patch.stock;let ex=u.sku?findItemBySku(u.sku):null;if(!ex&&u.name)ex=state.items.find(i=>i.name.toLowerCase()===u.name.toLowerCase());if(ex){Object.assign(ex,patch);if(hasStock){if(!ex.stocks)ex.stocks={};ex.stocks[target]=stockVal;}updated++;}else{const base={id:uid('itm'),sku:u.sku||('SKU-'+Math.floor(Math.random()*9000+1000)),name:u.name||u.sku||'Unnamed',type:'raw',category:'Uncategorized',unit:'unit',price:0,stocks:{},supplier:'—',leadTime:0,reorderPoint:0,safetyStock:0};Object.assign(base,patch);if(hasStock)base.stocks[target]=stockVal;if(!base.name)base.name=base.sku;state.items.push(base);added++;}});saveState();return {added,updated,target};}
function applyRecipes(parsed){let added=0,updated=0,createdProducts=0;const warnings=parsed.errors.slice();parsed.recipes.forEach(R=>{let prod=R.productSku?findItemBySku(R.productSku):null;if(!prod&&R.productName)prod=state.items.find(i=>i.type==='product'&&i.name.toLowerCase()===R.productName.toLowerCase());if(!prod){if(R.productSku||R.productName){prod={id:uid('itm'),sku:R.productSku||('PRD-'+Math.floor(Math.random()*9000+1000)),name:R.productName||R.productSku||R.name,type:'product',category:'Finished',unit:R.outUnit||'unit',price:0,stocks:{},supplier:'—',leadTime:0,reorderPoint:0,safetyStock:0};state.items.push(prod);createdProducts++;}else{warnings.push('Recipe "'+R.name+'": no product specified — skipped');return;}}const comps=[];R.components.forEach(c=>{const it=findItemBySku(c.sku);if(it&&c.qty>0)comps.push({itemId:it.id,qty:c.qty});else warnings.push('Recipe "'+R.name+'": material "'+c.sku+'" not found — skipped');});if(!comps.length){warnings.push('Recipe "'+R.name+'": no valid materials — skipped');return;}const data={name:R.name,productId:prod.id,batchSize:R.batchSize||1,outUnit:R.outUnit||'units',components:comps};const ex=state.recipes.find(x=>x.name.toLowerCase()===R.name.toLowerCase());if(ex){Object.assign(ex,data);updated++;}else{state.recipes.push({id:uid('rcp'),...data});added++;}});saveState();return {added,updated,createdProducts,warnings};}

/* ---------- Image handling ---------- */
function readImageResized(file,maxDim,quality){
  return new Promise((res,rej)=>{
    if(!file)return rej(new Error('No file'));
    const rd=new FileReader();
    rd.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;const s=Math.min(1,(maxDim||1200)/Math.max(w,h));w=Math.round(w*s);h=Math.round(h*s);const cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(img,0,0,w,h);try{res(cv.toDataURL('image/jpeg',quality||0.6));}catch(e){rej(e);}};img.onerror=()=>rej(new Error('That file is not a valid image'));img.src=rd.result;};
    rd.onerror=()=>rej(new Error('Could not read the file'));rd.readAsDataURL(file);
  });
}
function openImage(receiptId){const r=state.receipts.find(x=>x.id===receiptId);if(!r||!r.invoice)return;const lb=document.createElement('div');lb.className='lightbox';lb.onclick=()=>lb.remove();lb.innerHTML='<img src="'+r.invoice+'" alt="invoice">';document.body.appendChild(lb);}

function saveReceipt(){
  if(!receiptInvoice){toast('Please attach a photo of the invoice');return;}
  const wh=val('rc_wh'),date=val('rc_date')||dateStr(today),sup=val('rc_sup'),ref=val('rc_ref');
  const lines=receiptLines.filter(l=>l.itemId&&(+l.qty)>0);
  if(!lines.length){toast('Add at least one item with a quantity');return;}
  const rid=uid('rct');const receipt={id:rid,date,whId:wh,supplier:sup||'—',ref:ref||'',invoice:receiptInvoice,by:currentUser?currentUser.email:'',lines:[]};
  lines.forEach(l=>{const it=itemById(l.itemId);const qty=+l.qty;addStk(it,wh,qty);let price=null;if(String(l.price).trim()!==''){price=+l.price;if(price!==+it.price){it.price=price;logPrice(it,price,'Receipt'+(ref?' '+ref:''));}}state.movements.push({id:uid('mov'),date,itemId:it.id,type:'in',qty,whId:wh,ref:(ref?'Receipt '+ref:'Receipt'),receiptId:rid});receipt.lines.push({itemId:it.id,qty,price});});
  state.receipts.push(receipt);saveState();
  closeModal();render();
  if(memFallback)toast('Saved to memory only — local storage may be full (invoice photos are large)');else toast('Received '+lines.length+' item'+(lines.length>1?'s':'')+' → '+whName(wh));
}

  const fromOpts=allowed.map(id=>'<option value="'+id+'"'+(id===from?' selected':'')+'>'+esc(whName(id))+'</option>').join('');

function renderTransferLines(){const items=state.items.slice().sort((a,b)=>a.name.localeCompare(b.name));document.getElementById('tr_lines').innerHTML=transferLines.map((ln,idx)=>'<div class="line-row" style="grid-template-columns:1fr 90px 30px">'+
  '<div class="field"><select class="control" onchange="app.setTransferLine('+idx+',\'itemId\',this.value)">'+items.map(i=>'<option value="'+i.id+'"'+(i.id===ln.itemId?' selected':'')+'>'+esc(i.name)+' ('+esc(i.unit)+')</option>').join('')+'</select></div>'+
  '<div class="field"><input type="number" min="0" step="0.01" class="control num" placeholder="Qty" value="'+ln.qty+'" onchange="app.setTransferLine('+idx+',\'qty\',this.value)"></div>'+
  '<button class="icon-btn icon-btn--danger" onclick="app.removeTransferLine('+idx+')">'+svg(I.minus,16)+'</button></div>').join('');}
function saveTransferBulk(){
  const from=val('tr_from'),to=val('tr_to'),date=val('tr_date')||dateStr(today),ref=val('tr_ref');
  if(from===to){toast('Choose two different warehouses');return;}
  const lines=transferLines.filter(l=>l.itemId&&(+l.qty)>0);
  if(!lines.length){toast('Add at least one item with a quantity');return;}
  const neg=lines.filter(l=>+l.qty>stkAt(itemById(l.itemId),from));
  if(neg.length&&!confirm(neg.length+' line(s) exceed available stock in '+whName(from)+'. Continue and allow negative stock?'))return;
  lines.forEach(l=>{const it=itemById(l.itemId);const q=+l.qty;addStk(it,from,-q);addStk(it,to,q);state.movements.push({id:uid('mov'),date,itemId:it.id,type:'transfer',qty:q,fromWh:from,toWh:to,ref:ref||'Transfer'});});
  saveState();closeModal();render();toast('Transferred '+lines.length+' item'+(lines.length>1?'s':'')+' → '+whName(to));
}

   '</div><div class="modal__foot"><button class="btn btn--ghost" onclick="app.closeModal()">Close</button></div></div>';
  openModal(body);

function saveUser(id){
  const email=val('u_email');const pw=document.getElementById('u_pw').value;
  if(!email){toast('Email is required');return;}
  if(state.users.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.id!==id)){toast('That email is already in use');return;}
  const role=val('u_role');let warehouses='all',perms={stock:true,recipe:true,transfer:true};
  if(role!=='admin'){
    warehouses=document.getElementById('u_wh_all').checked?'all':Array.from(document.querySelectorAll('.u-wh')).filter(c=>c.checked).map(c=>c.value);
    if(warehouses!=='all'&&!warehouses.length){toast('Select at least one warehouse for this user');return;}
    perms={stock:document.getElementById('u_perm_stock').checked,recipe:document.getElementById('u_perm_recipe').checked,transfer:document.getElementById('u_perm_transfer').checked};
  }
  if(id){const u=state.users.find(x=>x.id===id);u.email=email;if(pw.trim())u.password=pw;u.role=role;u.warehouses=warehouses;u.perms=perms;if(currentUser&&currentUser.id===id)currentUser=u;toast('User updated');}
  else{if(!pw.trim()){toast('Set a password for the new user');return;}state.users.push({id:uid('usr'),email,password:pw,role,warehouses,perms,created:dateStr(today)});toast('User created');}
  saveState();closeModal();render();
}
function deleteUser(id){
  const u=state.users.find(x=>x.id===id);if(!u)return;
  if(currentUser&&currentUser.id===id){toast('You can’t delete your own account while signed in');return;}
  if(u.role==='admin'&&state.users.filter(x=>x.role==='admin').length<=1){toast('At least one administrator is required');return;}
  if(!confirm('Delete user '+u.email+'?'))return;
  state.users=state.users.filter(x=>x.id!==id);saveState();render();toast('User deleted');
}

function toast(msg){
  const w=document.getElementById('toast-wrap');
  const t=document.createElement('div');t.className='toast';t.innerHTML=svg(I.check,17)+esc(msg);
  w.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateY(10px)';t.style.transition='.3s';setTimeout(()=>t.remove(),300);},2400);
}

  closeModal,
  itemModal,saveItem,deleteItem,

  addComp(){modalComponents.push({itemId:state.items.filter(i=>i.type==='raw')[0].id,qty:1});renderComps();},
  removeComp(i){modalComponents.splice(i,1);if(!modalComponents.length)modalComponents.push({itemId:state.items.filter(x=>x.type==='raw')[0].id,qty:1});renderComps();},
  setComp(i,k,v){modalComponents[i][k]=k==='qty'?(parseFloat(v)||0):v;},
  invSearch(v){uiState.invSearch=v;const scroll=window.scrollY;render();const inp=document.querySelector('.search .control');if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}window.scrollTo(0,scroll);},
  invCat(v){uiState.invCat=v;render();},
  invType(v){uiState.invType=v;render();},
  flowFilter(v){uiState.flowFilter=v;render();},
  anaPeriod(v){uiState.anaPeriod=v;render();},
  setProdRecipe(id){uiState.prodRecipe=id;uiState.prodResult=null;render();},
  setProdBatches(v){uiState.prodBatches=parseFloat(v)||0;},
  runProduction(){const rid=uiState.prodRecipe||state.recipes[0].id;const b=uiState.prodBatches||1;const fromWh=uiState.prodFromWh||'wh2';const toWh=uiState.prodToWh||'wh3';uiState.prodRecipe=rid;uiState.prodResult={recipeId:rid,batches:b,fromWh,toWh,rows:explode(rid,b,fromWh)};render();},
  produceDeduct(){
    if(!can('stock')){toast('You do not have permission');return;}
    const res=uiState.prodResult;if(!res)return;const r=recipeById(res.recipeId);
    const shorts=res.rows.filter(x=>x.short>0);
    if(shorts.length){toast('Cannot deduct — insufficient stock');return;}
    if(!confirm('Produce '+fmt(r.batchSize*res.batches)+' '+r.outUnit+'? Materials leave '+whName(res.fromWh)+' and finished goods enter '+whName(res.toWh)+'.'))return;
    const ds=dateStr(today);
    res.rows.forEach(x=>{const it=itemById(x.item.id);addStk(it,res.fromWh,-x.need);state.movements.push({id:uid('mov'),date:ds,itemId:it.id,type:'out',qty:x.need,whId:res.fromWh,ref:'Production: '+r.name});});
    const prod=itemById(r.productId);const output=r.batchSize*res.batches;
    if(prod){addStk(prod,res.toWh,output);state.movements.push({id:uid('mov'),date:ds,itemId:prod.id,type:'in',qty:output,whId:res.toWh,ref:'Produced: '+r.name});}
    const cost=res.rows.reduce((a,x)=>a+x.cost,0);
    state.production.push({id:uid('prd'),date:ds,recipeName:r.name,batches:res.batches,output,outUnit:r.outUnit,cost});
    uiState.prodResult=null;saveState();render();toast('Produced '+fmt(output)+' '+r.outUnit+' → '+whName(res.toWh));
  },
  setProdFromWh(v){uiState.prodFromWh=v;uiState.prodResult=null;render();},
  setProdToWh(v){uiState.prodToWh=v;uiState.prodResult=null;render();},
  receiveReorder(id,qty){if(!can('stock')){toast('You do not have permission');return;}const it=itemById(id);const wh=currentWh!=='all'?currentWh:'wh2';if(!confirm('Log receipt of '+fmt(qty)+' '+it.unit+' of '+it.name+' into '+whName(wh)+'?'))return;addStk(it,wh,qty);state.movements.push({id:uid('mov'),date:dateStr(today),itemId:id,type:'in',qty,whId:wh,ref:'Reorder receipt'});saveState();render();toast('Received '+fmt(qty)+' '+it.unit+' → '+whName(wh));},
  setWh(id){currentWh=id;window.scrollTo(0,0);render();},
  transferModal(itemId){transferModal(itemId);},
  saveTransfer,
  addWarehouse(){state.warehouses.push({id:uid('wh'),name:'New Warehouse',tag:''});saveState();render();toast('Warehouse added');},
  saveWhField(id,field,v){const w=whById(id);if(w){w[field]=v;saveState();render();}},
  deleteWarehouse(id){
    if(state.warehouses.length<=1){toast('At least one warehouse is required');return;}
    const w=whById(id);const others=state.warehouses.filter(x=>x.id!==id);
    const hasStock=state.items.some(i=>stkAt(i,id)>0);
    if(hasStock){if(!confirm('"'+w.name+'" still holds stock. Move it all into "'+others[0].name+'" and delete?'))return;state.items.forEach(i=>{const q=stkAt(i,id);if(q){addStk(i,others[0].id,q);if(i.stocks)delete i.stocks[id];}});}
    else if(!confirm('Delete warehouse "'+w.name+'"?'))return;
    state.movements=state.movements.filter(m=>m.whId!==id&&m.fromWh!==id&&m.toWh!==id);
    state.warehouses=others;
    if(currentWh===id)currentWh='all';
    if(uiState.prodFromWh===id)uiState.prodFromWh=null;
    if(uiState.prodToWh===id)uiState.prodToWh=null;
    saveState();render();toast('Warehouse deleted');
  },
  setCurrency(v){state.currency=v||'';saveState();render();},
  exportData(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='stockdock-backup-'+dateStr(today)+'.json';a.click();URL.revokeObjectURL(a.href);toast('Backup downloaded');},
  importData(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{try{const d=JSON.parse(rd.result);if(!d.items)throw 0;state=d;migrate();saveState();render();toast('Data imported');}catch(err){toast('Invalid backup file');}};rd.readAsText(f);},
  resetData(){if(!confirm('Replace everything with the sample bakery-warehouse data?'))return;state=seedData();migrate();currentWh='all';saveState();currentView='dashboard';render();toast('Sample data restored');},
  clearData(){if(!confirm('Delete ALL items, movements and recipes? This cannot be undone.'))return;state={currency:state.currency,warehouses:state.warehouses,items:[],recipes:[],movements:[],production:[]};saveState();currentView='inventory';render();toast('All data cleared');},
  importModal(kind){openImport(kind);},
  handleImportFile(ev){handleImportFile(ev);},
  importBack(){importCtx.parsed=null;importCtx.error=null;renderImport();},
  confirmImport(){confirmImport();},
  downloadTemplate(kind){downloadTemplate(kind);},
  submitLogin(){const email=document.getElementById('lg_email').value,pw=document.getElementById('lg_pw').value;if(login(email,pw)){showLoginOrApp();toast('Welcome, '+currentUser.email);}else{const e=document.getElementById('lg_err');if(e)e.style.display='block';}},
  logout(){currentUser=null;try{localStorage.removeItem(SESSION_KEY);}catch(e){}currentWh='all';currentView='dashboard';closeModal();showLoginOrApp();},
  userModal(id){userModal(id);},
  saveUser(id){saveUser(id);},
  deleteUser(id){deleteUser(id);},
  userRoleToggle(role){const lim=document.getElementById('u_limited'),note=document.getElementById('u_adminnote');if(lim)lim.style.display=role==='admin'?'none':'';if(note)note.style.display=role==='admin'?'':'none';},
  userAllToggle(on){document.querySelectorAll('.u-wh').forEach(c=>{c.checked=on;});},
  receiptModal(){receiptModal();},
  receiptInvoice(ev){const f=ev.target.files&&ev.target.files[0];if(!f)return;readImageResized(f,1200,0.6).then(d=>{receiptInvoice=d;renderReceiptInvoice();}).catch(e=>toast(e.message||'Could not read image'));},
  addReceiptLine(){receiptLines.push({itemId:state.items[0].id,qty:'',price:''});renderReceiptLines();},
  removeReceiptLine(i){receiptLines.splice(i,1);if(!receiptLines.length)receiptLines.push({itemId:state.items[0].id,qty:'',price:''});renderReceiptLines();},
  setReceiptLine(i,k,v){receiptLines[i][k]=v;},
  saveReceipt(){saveReceipt();},
  transferBulkModal(){transferBulkModal();},
  transferModal(itemId){transferModal(itemId);},
  addTransferLine(){transferLines.push({itemId:state.items[0].id,qty:''});renderTransferLines();},
  removeTransferLine(i){transferLines.splice(i,1);if(!transferLines.length)transferLines.push({itemId:state.items[0].id,qty:''});renderTransferLines();},
  setTransferLine(i,k,v){transferLines[i][k]=v;},
  saveTransferBulk(){saveTransferBulk();},
  itemHistory(id){itemHistoryModal(id);},
  openImage(id){openImage(id);},
  changeMyPassword(){const el=document.getElementById('my_pw');const v=el?el.value.trim():'';if(!v){toast('Enter a new password');return;}currentUser.password=v;saveState();if(el)el.value='';toast('Your password was updated');},
};
window.app=app;

/* keyboard: Esc closes modal */
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ---------- Boot ---------- */
loadState();
loadSession();
showLoginOrApp();
if(memFallback)setTimeout(()=>toast('Local storage unavailable — changes won\'t persist'),600);
</script>
</body>
</html>
